<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
  <!-- School building -->
  <g fill="#198754">
    <rect x="10" y="15" width="40" height="30" rx="2" ry="2"/>
    <polygon points="5,15 30,5 55,15"/>
    <rect x="20" y="25" width="8" height="10" fill="#fff"/>
    <rect x="32" y="25" width="8" height="10" fill="#fff"/>
    <rect x="20" y="40" width="20" height="5" fill="#fff"/>
  </g>
  
  <!-- Book stack -->
  <g transform="translate(60, 12)">
    <rect x="0" y="0" width="30" height="5" rx="1" fill="#198754"/>
    <rect x="2" y="5" width="30" height="5" rx="1" fill="#198754" opacity="0.9"/>
    <rect x="0" y="10" width="30" height="5" rx="1" fill="#198754" opacity="0.8"/>
    <rect x="2" y="15" width="30" height="5" rx="1" fill="#198754" opacity="0.7"/>
    <rect x="0" y="20" width="30" height="5" rx="1" fill="#198754" opacity="0.9"/>
    <rect x="2" y="25" width="30" height="5" rx="1" fill="#198754"/>
  </g>
  
  <!-- Clipboard -->
  <g transform="translate(100, 10)">
    <rect x="0" y="0" width="25" height="35" rx="2" fill="#198754"/>
    <rect x="2" y="6" width="21" height="27" rx="1" fill="#fff"/>
    <rect x="6" y="0" width="13" height="3" rx="1.5" fill="#198754" stroke="#fff" stroke-width="1"/>
    <!-- Lines on clipboard -->
    <line x1="5" y1="12" x2="20" y2="12" stroke="#198754" stroke-width="1.5"/>
    <line x1="5" y1="18" x2="20" y2="18" stroke="#198754" stroke-width="1.5"/>
    <line x1="5" y1="24" x2="20" y2="24" stroke="#198754" stroke-width="1.5"/>
    <line x1="5" y1="30" x2="15" y2="30" stroke="#198754" stroke-width="1.5"/>
  </g>
  
  <!-- Text -->
  <g transform="translate(135, 25)">
    <text font-family="'Poppins', sans-serif" font-size="12" font-weight="600" fill="#198754">
      <tspan x="0" y="0">School</tspan>
      <tspan x="0" y="15">Inventory</tspan>
    </text>
  </g>

  <!-- Decorative elements -->
  <circle cx="130" cy="20" r="3" fill="#198754" opacity="0.6"/>
  <circle cx="130" cy="35" r="2" fill="#198754" opacity="0.4"/>
  <circle cx="185" cy="15" r="2" fill="#198754" opacity="0.5"/>
  <circle cx="190" cy="40" r="3" fill="#198754" opacity="0.7"/>
</svg> 