<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <!-- Enhanced definitions with more professional gradients and filters -->
  <defs>
    <!-- Refined Indian Flag Tricolor Gradients -->
    <linearGradient id="saffronGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF9933" />
      <stop offset="50%" stop-color="#FF8C00" />
      <stop offset="100%" stop-color="#FF7F00" />
    </linearGradient>
    
    <linearGradient id="whiteGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#FAFAFA" />
      <stop offset="100%" stop-color="#F5F5F5" />
    </linearGradient>
    
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#138808" />
      <stop offset="50%" stop-color="#0F7104" />
      <stop offset="100%" stop-color="#0B5A03" />
    </linearGradient>
    
    <!-- Shadow filters -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" />
      <feOffset dx="1" dy="1" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Subtle glow effect for decorative elements -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Enhanced chakra gradient -->
    <radialGradient id="chakraGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1976D2" />
      <stop offset="100%" stop-color="#0D47A1" />
    </radialGradient>
    
    <!-- Enhanced lotus gradients -->
    <radialGradient id="lotusOuterGradient" cx="50%" cy="50%" r="50%" fx="40%" fy="40%">
      <stop offset="0%" stop-color="#FF9933" />
      <stop offset="100%" stop-color="#FF7700" />
    </radialGradient>
    
    <radialGradient id="lotusInnerGradient" cx="50%" cy="50%" r="50%" fx="40%" fy="40%">
      <stop offset="0%" stop-color="#FF6600" />
      <stop offset="100%" stop-color="#E65C00" />
    </radialGradient>
  </defs>
  
  <!-- Enhanced tricolor background with subtle shadow -->
  <g filter="url(#softShadow)">
    <rect x="0" y="5" width="60" height="16.6" fill="url(#saffronGradient)" rx="3" ry="3"/>
    <rect x="0" y="21.6" width="60" height="16.8" fill="url(#whiteGradient)" rx="3" ry="3"/>
    <rect x="0" y="38.4" width="60" height="16.6" fill="url(#greenGradient)" rx="3" ry="3"/>
  </g>
  
  <!-- Enhanced Ashoka Chakra with improved detail and depth -->
  <g transform="translate(30, 30) scale(0.6)" filter="url(#softShadow)">
    <!-- Base chakra -->
    <circle cx="0" cy="0" r="12" fill="url(#chakraGradient)"/>
    <circle cx="0" cy="0" r="11" fill="none" stroke="#FFFFFF" stroke-width="1"/>
    
    <!-- Enhanced spokes with light effect -->
    <g stroke="#FFFFFF" stroke-width="1">
      <!-- Main spokes -->
      <line x1="0" y1="-12" x2="0" y2="12"/>
      <line x1="-12" y1="0" x2="12" y2="0"/>
      <line x1="-8.5" y1="-8.5" x2="8.5" y2="8.5"/>
      <line x1="8.5" y1="-8.5" x2="-8.5" y2="8.5"/>
      
      <!-- Additional spokes for professional detail -->
      <line x1="-11" y1="-4.5" x2="11" y2="4.5"/>
      <line x1="-11" y1="4.5" x2="11" y2="-4.5"/>
      <line x1="-4.5" y1="-11" x2="4.5" y2="11"/>
      <line x1="4.5" y1="-11" x2="-4.5" y2="11"/>
      <line x1="-12" y1="-2" x2="12" y2="2"/>
      <line x1="-12" y1="2" x2="12" y2="-2"/>
      <line x1="-2" y1="-12" x2="2" y2="12"/>
      <line x1="2" y1="-12" x2="-2" y2="12"/>
      
      <!-- Additional minor spokes for enhanced detail -->
      <line x1="-10" y1="-6" x2="10" y2="6" opacity="0.7"/>
      <line x1="-6" y1="-10" x2="6" y2="10" opacity="0.7"/>
      <line x1="-10" y1="6" x2="10" y2="-6" opacity="0.7"/>
      <line x1="-6" y1="10" x2="6" y2="-10" opacity="0.7"/>
    </g>
    
    <!-- Subtle glow effect -->
    <circle cx="0" cy="0" r="14" fill="none" stroke="#FFFFFF" stroke-width="0.3" opacity="0.4" filter="url(#glow)"/>
  </g>
  
  <!-- Enhanced Lotus Flower with depth and texture -->
  <g transform="translate(80, 30)" filter="url(#softShadow)">
    <!-- Outer petals with enhanced gradient -->
    <path d="M0,-15 C5,-12 8,-5 8,0 C8,5 5,12 0,15 C-5,12 -8,5 -8,0 C-8,-5 -5,-12 0,-15" fill="url(#lotusOuterGradient)"/>
    <path d="M10.6,-10.6 C13.5,-4.5 13.5,4.5 10.6,10.6 C4.5,13.5 -4.5,13.5 -10.6,10.6 C-13.5,4.5 -13.5,-4.5 -10.6,-10.6 C-4.5,-13.5 4.5,-13.5 10.6,-10.6" fill="url(#lotusOuterGradient)" opacity="0.8"/>
    
    <!-- Inner petals with enhanced gradient -->
    <path d="M0,-8 C3,-6 5,-3 5,0 C5,3 3,6 0,8 C-3,6 -5,3 -5,0 C-5,-3 -3,-6 0,-8" fill="url(#lotusInnerGradient)" opacity="0.9"/>
    
    <!-- Enhanced center -->
    <circle cx="0" cy="0" r="5" fill="url(#lotusInnerGradient)"/>
    
    <!-- Pollen detail with texture -->
    <circle cx="0" cy="0" r="3" fill="#FFD700"/>
    <circle cx="0" cy="0" r="2" fill="#FFC107"/>
    
    <!-- Pollen detail dots -->
    <circle cx="1" cy="1" r="0.5" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="-1" cy="-0.5" r="0.3" fill="#FFFFFF" opacity="0.7"/>
    
    <!-- Subtle glow effect -->
    <circle cx="0" cy="0" r="16" fill="none" stroke="#FF9933" stroke-width="0.5" opacity="0.3" filter="url(#glow)"/>
  </g>
  
  <!-- Enhanced Text with better typography and effects -->
  <g transform="translate(110, 33)" filter="url(#softShadow)">
    <!-- Enhanced School in Devanagari - विद्यालय with refined typography -->
    <text font-family="'Tiro Devanagari Hindi', serif" font-size="14" font-weight="600" fill="#0066CC">
      <tspan x="0" y="-8">विद्यालय</tspan>
    </text>
    
    <!-- Enhanced decorative swirl with gradient and variable width -->
    <path d="M0,-5 C10,-3 20,-4 30,-6 C40,-8 50,-5 60,-3" stroke="url(#saffronGradient)" stroke-width="0.8" opacity="0.6" fill="none">
      <animate attributeName="opacity" values="0.6;0.8;0.6" dur="5s" repeatCount="indefinite"/>
    </path>
    
    <!-- Enhanced Samridhi text with shadow -->
    <text font-family="'Poppins', sans-serif" font-size="15.5" font-weight="700" fill="#138808">
      <tspan x="0" y="10">Samridhi</tspan>
    </text>
    
    <!-- Text shadow effect -->
    <text font-family="'Poppins', sans-serif" font-size="15.5" font-weight="700" fill="#138808" opacity="0.15" transform="translate(0.8, 0.8)">
      <tspan x="0" y="10">Samridhi</tspan>
    </text>
  </g>

  <!-- Enhanced Decorative Elements with refined detailing -->
  <!-- Traditional paisley (mango) motif with gradient -->
  <g transform="translate(220, 15) scale(0.5)" filter="url(#softShadow)">
    <path d="M0,0 C3,3 3,7 0,10 C-3,7 -3,3 0,0" fill="url(#saffronGradient)"/>
    <path d="M0,0 C5,-5 15,-5 15,5 C15,15 5,25 -5,20 C-10,15 -5,5 0,0 Z" fill="none" stroke="url(#saffronGradient)" stroke-width="1.5"/>
    
    <!-- Additional detailing within the paisley -->
    <path d="M0,2 C2,4 2,6 0,8" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.5"/>
    <path d="M5,0 C8,-2 10,-2 12,0" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.5"/>
  </g>
  
  <g transform="translate(220, 45) scale(0.5)" filter="url(#softShadow)">
    <path d="M0,0 C3,3 3,7 0,10 C-3,7 -3,3 0,0" fill="url(#greenGradient)" transform="rotate(180 0 5)"/>
    <path d="M0,10 C5,15 15,15 15,5 C15,-5 5,-15 -5,-10 C-10,-5 -5,5 0,10 Z" fill="none" stroke="url(#greenGradient)" stroke-width="1.5"/>
    
    <!-- Additional detailing within the paisley -->
    <path d="M0,8 C2,6 2,4 0,2" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.5" transform="rotate(180 0 5)"/>
    <path d="M5,10 C8,12 10,12 12,10" fill="none" stroke="#FFFFFF" stroke-width="0.5" opacity="0.5" transform="rotate(180 0 5)"/>
  </g>
</svg> 