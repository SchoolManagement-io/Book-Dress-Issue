<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <!-- Enhanced definitions with professional gradients and filters -->
  <defs>
    <!-- Background gradient -->
    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
    
    <!-- Skin tone gradients -->
    <linearGradient id="skinToneParent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a181"/>
      <stop offset="100%" stop-color="#c1876b"/>
    </linearGradient>
    
    <linearGradient id="skinToneChild" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e6b58b"/>
      <stop offset="100%" stop-color="#d49d75"/>
    </linearGradient>
    
    <!-- Saree gradient -->
    <linearGradient id="sareeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e91e63"/>
      <stop offset="100%" stop-color="#c2185b"/>
    </linearGradient>
    
    <!-- Uniform gradient -->
    <linearGradient id="uniformGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3f51b5"/>
      <stop offset="100%" stop-color="#303f9f"/>
    </linearGradient>
    
    <!-- Hair gradient -->
    <linearGradient id="hairGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#212121"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    
    <!-- Enhanced rangoli pattern -->
    <pattern id="rangoli" patternUnits="userSpaceOnUse" width="80" height="80" patternTransform="scale(0.2)">
      <circle cx="40" cy="40" r="35" fill="none" stroke="#f8bbd0" stroke-width="1.5"/>
      <circle cx="40" cy="40" r="25" fill="none" stroke="#f8bbd0" stroke-width="1.5"/>
      <circle cx="40" cy="40" r="15" fill="none" stroke="#f8bbd0" stroke-width="1.5"/>
      <path d="M40,5 L40,75 M5,40 L75,40 M12,12 L68,68 M12,68 L68,12" stroke="#f8bbd0" stroke-width="1.5" fill="none"/>
      <path d="M40,5 Q55,20 75,40 Q60,55 40,75 Q25,60 5,40 Q20,25 40,5 Z" fill="none" stroke="#f8bbd0" stroke-width="1"/>
    </pattern>
    
    <!-- Shadow filter -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
    
    <!-- Subtle glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#f8bbd0" flood-opacity="0.5" result="floodColor"/>
      <feComposite in="floodColor" in2="blur" operator="in" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Enhanced background with subtle texture and rangoli pattern -->
  <rect x="0" y="0" width="400" height="250" fill="url(#backgroundGradient)" rx="10" ry="10"/>
  
  <!-- Enhanced decorative circles with subtle animation -->
  <circle cx="370" cy="50" r="30" fill="#e91e63" opacity="0.1">
    <animate attributeName="r" values="30;33;30" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.08;0.1" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="40" cy="200" r="25" fill="#3f51b5" opacity="0.1">
    <animate attributeName="r" values="25;28;25" dur="8s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="opacity" values="0.1;0.08;0.1" dur="8s" repeatCount="indefinite" begin="2s"/>
  </circle>
  <circle cx="200" cy="30" r="20" fill="#e91e63" opacity="0.15">
    <animate attributeName="r" values="20;23;20" dur="8s" repeatCount="indefinite" begin="4s"/>
    <animate attributeName="opacity" values="0.15;0.12;0.15" dur="8s" repeatCount="indefinite" begin="4s"/>
  </circle>
  
  <!-- Enhanced rangoli pattern at the bottom center -->
  <circle cx="200" cy="230" r="80" fill="url(#rangoli)" opacity="0.2" filter="url(#glow)"/>
  
  <!-- Enhanced mother figure with saree and refined details -->
  <g transform="translate(150, 125)" filter="url(#dropShadow)">
    <!-- Saree -->
    <path d="M-30,40 Q-15,30 -5,45 L-20,90 Q-30,80 -45,85 Q-40,60 -30,40 Z" fill="url(#sareeGradient)"/>
    <path d="M-5,45 L-5,90 L-20,90 Q-15,70 -5,45 Z" fill="url(#sareeGradient)" opacity="0.8"/>
    <path d="M-5,45 Q5,30 20,35 L15,90 L-5,90 Z" fill="url(#sareeGradient)"/>
    
    <!-- Sari pallu over shoulder -->
    <path d="M-15,10 Q-25,25 -30,40 Q-25,35 -15,30 Q-5,25 -5,40 L-15,10 Z" fill="url(#sareeGradient)" opacity="0.9"/>
    
    <!-- Upper body / blouse -->
    <path d="M-15,10 L-5,40 Q5,30 20,35 Q15,20 10,10 Q0,0 -15,10 Z" fill="#880e4f"/>
    
    <!-- Neck -->
    <path d="M-5,0 Q0,-5 5,0 Q10,5 5,10 Q0,5 -5,0 Z" fill="url(#skinToneParent)"/>
    
    <!-- Head -->
    <ellipse cx="0" cy="-15" rx="15" ry="18" fill="url(#skinToneParent)"/>
    
    <!-- Hair -->
    <path d="M-15,-15 Q-20,-30 -10,-35 Q0,-40 10,-35 Q20,-30 15,-15 Q10,-25 0,-28 Q-10,-25 -15,-15 Z" fill="url(#hairGradient)"/>
    
    <!-- Bindi -->
    <circle cx="0" cy="-20" r="2" fill="#c2185b"/>
    
    <!-- Face features -->
    <ellipse cx="-6" cy="-18" rx="2" ry="1" fill="#3e2723"/> <!-- Left eye -->
    <ellipse cx="6" cy="-18" rx="2" ry="1" fill="#3e2723"/> <!-- Right eye -->
    <path d="M0,-14 Q3,-12 0,-10" fill="none" stroke="#3e2723" stroke-width="0.5"/> <!-- Nose -->
    <path d="M-4,-8 Q0,-6 4,-8" fill="none" stroke="#3e2723" stroke-width="0.5"/> <!-- Mouth -->
    
    <!-- Hands -->
    <path d="M-30,40 Q-35,45 -45,50 Q-48,55 -45,60 Q-42,62 -38,60 Q-35,58 -30,55 Z" fill="url(#skinToneParent)"/> <!-- Left hand -->
    <path d="M20,35 Q25,40 35,45 Q40,50 38,55 Q35,58 30,55 Z" fill="url(#skinToneParent)"/> <!-- Right arm/hand -->
    
    <!-- Bangles -->
    <path d="M-45,55 Q-42,57 -38,55" fill="none" stroke="#ffd700" stroke-width="1"/>
    <path d="M-44,53 Q-41,55 -39,53" fill="none" stroke="#ffd700" stroke-width="1"/>
    
    <!-- Jewelry - necklace -->
    <path d="M-5,5 Q0,10 5,5" fill="none" stroke="#ffd700" stroke-width="1"/>
    
    <!-- Small decoration in hair (flower) -->
    <circle cx="-12" cy="-22" r="3" fill="#f8bbd0"/>
    <circle cx="-12" cy="-22" r="1.5" fill="#f48fb1"/>
  </g>
  
  <!-- Enhanced child figure with school uniform -->
  <g transform="translate(250, 135)" filter="url(#dropShadow)">
    <!-- Uniform -->
    <rect x="-20" y="10" width="40" height="50" rx="5" ry="5" fill="url(#uniformGradient)"/>
    <rect x="-20" y="10" width="40" height="10" rx="2" ry="2" fill="#c5cae9"/> <!-- Shirt collar -->
    <rect x="-15" y="60" width="12" height="30" rx="2" ry="2" fill="#1a237e"/> <!-- Left leg -->
    <rect x="3" y="60" width="12" height="30" rx="2" ry="2" fill="#1a237e"/> <!-- Right leg -->
    
    <!-- School bag -->
    <rect x="10" y="20" width="15" height="20" rx="2" ry="2" fill="#880e4f"/>
    <rect x="12" y="18" width="10" height="3" rx="1" ry="1" fill="#ad1457"/> <!-- Bag strap -->
    
    <!-- Hands -->
    <ellipse cx="-25" cy="30" rx="5" ry="8" fill="url(#skinToneChild)"/> <!-- Left arm -->
    <ellipse cx="-25" cy="30" rx="3" ry="3" fill="url(#skinToneChild)"/> <!-- Left hand -->
    
    <!-- Neck -->
    <rect x="-5" y="0" width="10" height="10" rx="5" ry="5" fill="url(#skinToneChild)"/>
    
    <!-- Head -->
    <ellipse cx="0" cy="-15" rx="12" ry="15" fill="url(#skinToneChild)"/>
    
    <!-- Hair -->
    <path d="M-12,-15 Q-15,-25 -8,-30 Q0,-35 8,-30 Q15,-25 12,-15 Q5,-25 0,-27 Q-5,-25 -12,-15 Z" fill="url(#hairGradient)"/>
    
    <!-- Face features -->
    <ellipse cx="-4" cy="-18" rx="1.5" ry="1" fill="#3e2723"/> <!-- Left eye -->
    <ellipse cx="4" cy="-18" rx="1.5" ry="1" fill="#3e2723"/> <!-- Right eye -->
    <path d="M0,-14 Q2,-12 0,-11" fill="none" stroke="#3e2723" stroke-width="0.5"/> <!-- Nose -->
    <path d="M-3,-8 Q0,-6 3,-8" fill="none" stroke="#3e2723" stroke-width="0.7"/> <!-- Mouth with smile -->
    
    <!-- School badge -->
    <circle cx="-10" cy="20" r="5" fill="#c5cae9"/>
    <text x="-10" y="22" font-family="Arial" font-size="6" text-anchor="middle" fill="#1a237e">S</text>
  </g>
  
  <!-- Enhanced hands holding -->
  <g filter="url(#dropShadow)">
    <path d="M120,185 Q150,190 180,185" fill="none" stroke="url(#skinToneParent)" stroke-width="4" stroke-linecap="round"/>
    <path d="M180,185 Q200,190 225,180" fill="none" stroke="url(#skinToneChild)" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Enhanced lotus flower decoration -->
  <g transform="translate(80, 190) scale(0.6)" filter="url(#glow)">
    <!-- Lotus petals -->
    <path d="M0,-20 C10,-15 15,-5 15,0 C15,5 10,15 0,20 C-10,15 -15,5 -15,0 C-15,-5 -10,-15 0,-20 Z" fill="#f8bbd0" opacity="0.8"/>
    <path d="M-20,0 C-15,-10 -5,-15 0,-15 C5,-15 15,-10 20,0 C15,10 5,15 0,15 C-5,15 -15,10 -20,0 Z" fill="#f8bbd0" opacity="0.8"/>
    <path d="M-14,-14 C-5,-15 -3,-5 0,-5 C3,-5 5,-15 14,-14 C15,-5 5,-3 5,0 C5,3 15,5 14,14 C5,15 3,5 0,5 C-3,5 -5,15 -14,14 C-15,5 -5,3 -5,0 C-5,-3 -15,-5 -14,-14 Z" fill="#f06292" opacity="0.6"/>
    <!-- Center -->
    <circle cx="0" cy="0" r="5" fill="#e91e63"/>
    <circle cx="0" cy="0" r="2" fill="#fce4ec"/>
  </g>
  
  <!-- Enhanced school bell -->
  <g transform="translate(320, 190) scale(0.8)" filter="url(#dropShadow)">
    <!-- Bell body -->
    <path d="M0,0 L-15,25 L15,25 Z" fill="#ffd700"/>
    <ellipse cx="0" cy="25" rx="15" ry="5" fill="#ffd700"/>
    
    <!-- Bell details -->
    <ellipse cx="0" cy="10" rx="5" ry="3" fill="#ffecb3"/>
    <path d="M0,25 L0,35" fill="none" stroke="#ffd700" stroke-width="3"/>
    <circle cx="0" cy="35" r="3" fill="#bf8f00"/>
    
    <!-- Subtle sheen -->
    <path d="M-10,15 L-5,20" fill="none" stroke="#ffecb3" stroke-width="0.5"/>
    <path d="M5,15 L10,20" fill="none" stroke="#ffecb3" stroke-width="0.5"/>
  </g>
  
  <!-- Enhanced title text -->
  <g transform="translate(200, 60)" filter="url(#dropShadow)">
    <text x="0" y="0" font-family="'Tiro Devanagari Hindi', Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#e91e63">शिक्षा का आधार</text>
    <text x="0" y="30" font-family="'Poppins', Arial" font-size="16" font-weight="400" text-anchor="middle" fill="#3f51b5">Foundation of Education</text>
  </g>
  
  <!-- Subtle animated elements -->
  <circle cx="200" cy="125" r="150" stroke="#f8bbd0" stroke-width="1" fill="none" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.1;0.2" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="r" values="150;155;150" dur="15s" repeatCount="indefinite"/>
  </circle>
</svg> 