<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <!-- Define enhanced gradients -->
    <linearGradient id="saffronGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9933" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0.3"/>
    </linearGradient>
    
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#138808" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0D6B04" stop-opacity="0.3"/>
    </linearGradient>
    
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0066CC" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#004C99" stop-opacity="0.3"/>
    </linearGradient>
    
    <!-- Filter for subtle glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <!-- Enhanced mandala pattern with refined details -->
    <pattern id="mandalaPattern" x="0" y="0" width="150" height="150" patternUnits="userSpaceOnUse">
      <!-- Mandala background circles -->
      <circle cx="75" cy="75" r="60" fill="none" stroke="url(#greenGradient)" stroke-width="0.3"/>
      <circle cx="75" cy="75" r="50" fill="none" stroke="url(#greenGradient)" stroke-width="0.4"/>
      <circle cx="75" cy="75" r="40" fill="none" stroke="url(#greenGradient)" stroke-width="0.5"/>
      <circle cx="75" cy="75" r="30" fill="none" stroke="url(#greenGradient)" stroke-width="0.6"/>
      
      <!-- Mandala detailed pattern with gradient -->
      <g transform="translate(75, 75)">
        <!-- 8-fold symmetry pattern with enhanced details -->
        <g>
          <!-- Layer 1: Main petals -->
          <g opacity="0.3">
            <path d="M0,0 L30,0 Q40,15 25,30 Q10,40 0,30 Z" fill="none" stroke="url(#saffronGradient)" stroke-width="0.8" transform="rotate(0)"/>
            <path d="M0,0 L30,0 Q40,15 25,30 Q10,40 0,30 Z" fill="none" stroke="url(#saffronGradient)" stroke-width="0.8" transform="rotate(45)"/>
            <path d="M0,0 L30,0 Q40,15 25,30 Q10,40 0,30 Z" fill="none" stroke="url(#saffronGradient)" stroke-width="0.8" transform="rotate(90)"/>
            <path d="M0,0 L30,0 Q40,15 25,30 Q10,40 0,30 Z" fill="none" stroke="url(#saffronGradient)" stroke-width="0.8" transform="rotate(135)"/>
            <path d="M0,0 L30,0 Q40,15 25,30 Q10,40 0,30 Z" fill="none" stroke="url(#saffronGradient)" stroke-width="0.8" transform="rotate(180)"/>
            <path d="M0,0 L30,0 Q40,15 25,30 Q10,40 0,30 Z" fill="none" stroke="url(#saffronGradient)" stroke-width="0.8" transform="rotate(225)"/>
            <path d="M0,0 L30,0 Q40,15 25,30 Q10,40 0,30 Z" fill="none" stroke="url(#saffronGradient)" stroke-width="0.8" transform="rotate(270)"/>
            <path d="M0,0 L30,0 Q40,15 25,30 Q10,40 0,30 Z" fill="none" stroke="url(#saffronGradient)" stroke-width="0.8" transform="rotate(315)"/>
          </g>
          
          <!-- Layer 2: Inner petals with depth -->
          <g opacity="0.25">
            <path d="M0,0 L15,0 Q20,8 15,15 Q8,20 0,15 Z" fill="none" stroke="url(#blueGradient)" stroke-width="0.7" transform="rotate(0)"/>
            <path d="M0,0 L15,0 Q20,8 15,15 Q8,20 0,15 Z" fill="none" stroke="url(#blueGradient)" stroke-width="0.7" transform="rotate(45)"/>
            <path d="M0,0 L15,0 Q20,8 15,15 Q8,20 0,15 Z" fill="none" stroke="url(#blueGradient)" stroke-width="0.7" transform="rotate(90)"/>
            <path d="M0,0 L15,0 Q20,8 15,15 Q8,20 0,15 Z" fill="none" stroke="url(#blueGradient)" stroke-width="0.7" transform="rotate(135)"/>
            <path d="M0,0 L15,0 Q20,8 15,15 Q8,20 0,15 Z" fill="none" stroke="url(#blueGradient)" stroke-width="0.7" transform="rotate(180)"/>
            <path d="M0,0 L15,0 Q20,8 15,15 Q8,20 0,15 Z" fill="none" stroke="url(#blueGradient)" stroke-width="0.7" transform="rotate(225)"/>
            <path d="M0,0 L15,0 Q20,8 15,15 Q8,20 0,15 Z" fill="none" stroke="url(#blueGradient)" stroke-width="0.7" transform="rotate(270)"/>
            <path d="M0,0 L15,0 Q20,8 15,15 Q8,20 0,15 Z" fill="none" stroke="url(#blueGradient)" stroke-width="0.7" transform="rotate(315)"/>
          </g>
          
          <!-- Layer 3: Detailed innermost pattern -->
          <g opacity="0.4">
            <path d="M0,0 Q4,4 8,0 Q4,-4 0,0" fill="none" stroke="url(#greenGradient)" stroke-width="0.5" transform="rotate(0)"/>
            <path d="M0,0 Q4,4 8,0 Q4,-4 0,0" fill="none" stroke="url(#greenGradient)" stroke-width="0.5" transform="rotate(45)"/>
            <path d="M0,0 Q4,4 8,0 Q4,-4 0,0" fill="none" stroke="url(#greenGradient)" stroke-width="0.5" transform="rotate(90)"/>
            <path d="M0,0 Q4,4 8,0 Q4,-4 0,0" fill="none" stroke="url(#greenGradient)" stroke-width="0.5" transform="rotate(135)"/>
            <path d="M0,0 Q4,4 8,0 Q4,-4 0,0" fill="none" stroke="url(#greenGradient)" stroke-width="0.5" transform="rotate(180)"/>
            <path d="M0,0 Q4,4 8,0 Q4,-4 0,0" fill="none" stroke="url(#greenGradient)" stroke-width="0.5" transform="rotate(225)"/>
            <path d="M0,0 Q4,4 8,0 Q4,-4 0,0" fill="none" stroke="url(#greenGradient)" stroke-width="0.5" transform="rotate(270)"/>
            <path d="M0,0 Q4,4 8,0 Q4,-4 0,0" fill="none" stroke="url(#greenGradient)" stroke-width="0.5" transform="rotate(315)"/>
          </g>
          
          <!-- Center dot with glow -->
          <circle cx="0" cy="0" r="3" fill="url(#greenGradient)" filter="url(#glow)"/>
        </g>
      </g>
    </pattern>
    
    <!-- Enhanced paisley pattern with refined details -->
    <pattern id="paisleyPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Main paisley element with gradient fill -->
      <g opacity="0.35">
        <path d="M25,50 C25,25 55,10 75,25 C95,40 95,70 75,80 C55,90 35,85 25,50 Z" fill="none" stroke="url(#blueGradient)" stroke-width="0.7"/>
        <path d="M30,50 C30,30 55,20 70,30 C85,45 85,65 70,70 C55,75 40,70 30,50 Z" fill="none" stroke="url(#blueGradient)" stroke-width="0.5"/>
        
        <!-- Internal details -->
        <path d="M45,50 Q65,35 70,50 Q65,65 45,50 Z" fill="none" stroke="url(#blueGradient)" stroke-width="0.4"/>
        <path d="M45,50 C45,40 60,35 70,40 C75,45 75,55 70,60 C65,55 55,55 45,50 Z" fill="none" stroke="url(#blueGradient)" stroke-width="0.3"/>
        <ellipse cx="55" cy="45" rx="4" ry="5" fill="none" stroke="url(#blueGradient)" stroke-width="0.2"/>
      </g>
      
      <!-- Rotated copies with different gradients -->
      <g transform="translate(100, 0) rotate(90 0 0)">
        <g opacity="0.35">
          <path d="M25,50 C25,25 55,10 75,25 C95,40 95,70 75,80 C55,90 35,85 25,50 Z" fill="none" stroke="url(#greenGradient)" stroke-width="0.7"/>
          <path d="M30,50 C30,30 55,20 70,30 C85,45 85,65 70,70 C55,75 40,70 30,50 Z" fill="none" stroke="url(#greenGradient)" stroke-width="0.5"/>
          
          <!-- Internal details -->
          <path d="M45,50 Q65,35 70,50 Q65,65 45,50 Z" fill="none" stroke="url(#greenGradient)" stroke-width="0.4"/>
          <path d="M45,50 C45,40 60,35 70,40 C75,45 75,55 70,60 C65,55 55,55 45,50 Z" fill="none" stroke="url(#greenGradient)" stroke-width="0.3"/>
          <ellipse cx="55" cy="45" rx="4" ry="5" fill="none" stroke="url(#greenGradient)" stroke-width="0.2"/>
        </g>
      </g>
    </pattern>
    
    <!-- Enhanced lotus pattern with refined details -->
    <pattern id="lotusPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <g transform="translate(50, 50)">
        <!-- Lotus petals with enhanced details -->
        <g opacity="0.3">
          <!-- Inner petals with gradient -->
          <g>
            <path d="M0,0 Q12,-15 0,-22 Q-12,-15 0,0" fill="none" stroke="url(#saffronGradient)" stroke-width="0.6" transform="rotate(0)"/>
            <path d="M0,0 Q12,-15 0,-22 Q-12,-15 0,0" fill="none" stroke="url(#saffronGradient)" stroke-width="0.6" transform="rotate(45)"/>
            <path d="M0,0 Q12,-15 0,-22 Q-12,-15 0,0" fill="none" stroke="url(#saffronGradient)" stroke-width="0.6" transform="rotate(90)"/>
            <path d="M0,0 Q12,-15 0,-22 Q-12,-15 0,0" fill="none" stroke="url(#saffronGradient)" stroke-width="0.6" transform="rotate(135)"/>
            <path d="M0,0 Q12,-15 0,-22 Q-12,-15 0,0" fill="none" stroke="url(#saffronGradient)" stroke-width="0.6" transform="rotate(180)"/>
            <path d="M0,0 Q12,-15 0,-22 Q-12,-15 0,0" fill="none" stroke="url(#saffronGradient)" stroke-width="0.6" transform="rotate(225)"/>
            <path d="M0,0 Q12,-15 0,-22 Q-12,-15 0,0" fill="none" stroke="url(#saffronGradient)" stroke-width="0.6" transform="rotate(270)"/>
            <path d="M0,0 Q12,-15 0,-22 Q-12,-15 0,0" fill="none" stroke="url(#saffronGradient)" stroke-width="0.6" transform="rotate(315)"/>
          </g>
          
          <!-- Outer petals with gradient -->
          <g>
            <path d="M0,0 Q18,-22 0,-38 Q-18,-22 0,0" fill="none" stroke="url(#greenGradient)" stroke-width="0.7" transform="rotate(0)"/>
            <path d="M0,0 Q18,-22 0,-38 Q-18,-22 0,0" fill="none" stroke="url(#greenGradient)" stroke-width="0.7" transform="rotate(45)"/>
            <path d="M0,0 Q18,-22 0,-38 Q-18,-22 0,0" fill="none" stroke="url(#greenGradient)" stroke-width="0.7" transform="rotate(90)"/>
            <path d="M0,0 Q18,-22 0,-38 Q-18,-22 0,0" fill="none" stroke="url(#greenGradient)" stroke-width="0.7" transform="rotate(135)"/>
            <path d="M0,0 Q18,-22 0,-38 Q-18,-22 0,0" fill="none" stroke="url(#greenGradient)" stroke-width="0.7" transform="rotate(180)"/>
            <path d="M0,0 Q18,-22 0,-38 Q-18,-22 0,0" fill="none" stroke="url(#greenGradient)" stroke-width="0.7" transform="rotate(225)"/>
            <path d="M0,0 Q18,-22 0,-38 Q-18,-22 0,0" fill="none" stroke="url(#greenGradient)" stroke-width="0.7" transform="rotate(270)"/>
            <path d="M0,0 Q18,-22 0,-38 Q-18,-22 0,0" fill="none" stroke="url(#greenGradient)" stroke-width="0.7" transform="rotate(315)"/>
          </g>
          
          <!-- Additional decorative petal details -->
          <g>
            <path d="M0,0 Q8,-12 0,-18 Q-8,-12 0,0" fill="none" stroke="url(#saffronGradient)" stroke-width="0.4" transform="rotate(22.5)"/>
            <path d="M0,0 Q8,-12 0,-18 Q-8,-12 0,0" fill="none" stroke="url(#saffronGradient)" stroke-width="0.4" transform="rotate(67.5)"/>
            <path d="M0,0 Q8,-12 0,-18 Q-8,-12 0,0" fill="none" stroke="url(#saffronGradient)" stroke-width="0.4" transform="rotate(112.5)"/>
            <path d="M0,0 Q8,-12 0,-18 Q-8,-12 0,0" fill="none" stroke="url(#saffronGradient)" stroke-width="0.4" transform="rotate(157.5)"/>
            <path d="M0,0 Q8,-12 0,-18 Q-8,-12 0,0" fill="none" stroke="url(#saffronGradient)" stroke-width="0.4" transform="rotate(202.5)"/>
            <path d="M0,0 Q8,-12 0,-18 Q-8,-12 0,0" fill="none" stroke="url(#saffronGradient)" stroke-width="0.4" transform="rotate(247.5)"/>
            <path d="M0,0 Q8,-12 0,-18 Q-8,-12 0,0" fill="none" stroke="url(#saffronGradient)" stroke-width="0.4" transform="rotate(292.5)"/>
            <path d="M0,0 Q8,-12 0,-18 Q-8,-12 0,0" fill="none" stroke="url(#saffronGradient)" stroke-width="0.4" transform="rotate(337.5)"/>
          </g>
        </g>
        
        <!-- Center circle with gradient and glow -->
        <circle cx="0" cy="0" r="5" fill="none" stroke="url(#blueGradient)" stroke-width="0.8"/>
        <circle cx="0" cy="0" r="3" fill="none" stroke="url(#blueGradient)" stroke-width="0.5"/>
        <circle cx="0" cy="0" r="1.5" fill="url(#blueGradient)" filter="url(#glow)"/>
      </g>
    </pattern>
    
    <!-- Enhanced Kolam pattern (traditional South Indian floor art) -->
    <pattern id="kolamPattern" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <g opacity="0.25">
        <!-- Kolam dots grid with enhanced visibility -->
        <g fill="#333">
          <circle cx="5" cy="5" r="1.2"/>
          <circle cx="15" cy="5" r="1.2"/>
          <circle cx="25" cy="5" r="1.2"/>
          <circle cx="35" cy="5" r="1.2"/>
          <circle cx="45" cy="5" r="1.2"/>
          
          <circle cx="5" cy="15" r="1.2"/>
          <circle cx="15" cy="15" r="1.2"/>
          <circle cx="25" cy="15" r="1.2"/>
          <circle cx="35" cy="15" r="1.2"/>
          <circle cx="45" cy="15" r="1.2"/>
          
          <circle cx="5" cy="25" r="1.2"/>
          <circle cx="15" cy="25" r="1.2"/>
          <circle cx="25" cy="25" r="1.2"/>
          <circle cx="35" cy="25" r="1.2"/>
          <circle cx="45" cy="25" r="1.2"/>
          
          <circle cx="5" cy="35" r="1.2"/>
          <circle cx="15" cy="35" r="1.2"/>
          <circle cx="25" cy="35" r="1.2"/>
          <circle cx="35" cy="35" r="1.2"/>
          <circle cx="45" cy="35" r="1.2"/>
          
          <circle cx="5" cy="45" r="1.2"/>
          <circle cx="15" cy="45" r="1.2"/>
          <circle cx="25" cy="45" r="1.2"/>
          <circle cx="35" cy="45" r="1.2"/>
          <circle cx="45" cy="45" r="1.2"/>
        </g>
        
        <!-- Enhanced Kolam line patterns with curves -->
        <g stroke="#333" stroke-width="0.6" fill="none">
          <path d="M5,5 C10,10 20,10 25,5 C30,0 40,0 45,5"/>
          <path d="M5,15 C10,20 20,20 25,15 C30,10 40,10 45,15"/>
          <path d="M5,25 C10,30 20,30 25,25 C30,20 40,20 45,25"/>
          <path d="M5,35 C10,40 20,40 25,35 C30,30 40,30 45,35"/>
          <path d="M5,45 C10,50 20,50 25,45 C30,40 40,40 45,45"/>
          
          <path d="M5,5 C0,10 0,20 5,25 C10,30 10,40 5,45"/>
          <path d="M15,5 C10,10 10,20 15,25 C20,30 20,40 15,45"/>
          <path d="M25,5 C20,10 20,20 25,25 C30,30 30,40 25,45"/>
          <path d="M35,5 C30,10 30,20 35,25 C40,30 40,40 35,45"/>
          <path d="M45,5 C40,10 40,20 45,25 C50,30 50,40 45,45"/>
        </g>
      </g>
    </pattern>
    
    <!-- Background texture for enhanced depth -->
    <pattern id="bgTexture" patternUnits="userSpaceOnUse" width="100" height="100" patternTransform="scale(0.5)">
      <rect width="100" height="100" fill="#FAFAFA"/>
      <path d="M0,0 L10,10 M20,0 L30,10 M40,0 L50,10 M60,0 L70,10 M80,0 L90,10
              M0,20 L10,30 M20,20 L30,30 M40,20 L50,30 M60,20 L70,30 M80,20 L90,30
              M0,40 L10,50 M20,40 L30,50 M40,40 L50,50 M60,40 L70,50 M80,40 L90,50
              M0,60 L10,70 M20,60 L30,70 M40,60 L50,70 M60,60 L70,70 M80,60 L90,70
              M0,80 L10,90 M20,80 L30,90 M40,80 L50,90 M60,80 L70,90 M80,80 L90,90"
            stroke="#f0f0f0" stroke-width="0.3"/>
    </pattern>
  </defs>
  
  <!-- Apply enhanced background texture -->
  <rect x="0" y="0" width="300" height="300" fill="url(#bgTexture)"/>
  
  <!-- Fill the entire area with the enhanced patterns with better layering -->
  <rect x="0" y="0" width="300" height="300" fill="url(#mandalaPattern)" opacity="0.8"/>
  <rect x="0" y="0" width="300" height="300" fill="url(#paisleyPattern)" opacity="0.7"/>
  <rect x="0" y="0" width="300" height="300" fill="url(#lotusPattern)" opacity="0.7"/>
  <rect x="0" y="0" width="300" height="300" fill="url(#kolamPattern)" opacity="0.6"/>
  
  <!-- Enhanced rangoli-inspired corner elements with gradients and details -->
  <g transform="translate(0, 0)" opacity="0.3">
    <path d="M0,0 Q45,12 55,55 Q12,45 0,0 Z" fill="none" stroke="url(#saffronGradient)" stroke-width="1.2"/>
    <path d="M5,5 Q40,15 50,50 Q15,40 5,5 Z" fill="none" stroke="url(#saffronGradient)" stroke-width="0.8"/>
    <path d="M10,10 Q35,20 45,45 Q20,35 10,10 Z" fill="none" stroke="url(#saffronGradient)" stroke-width="0.6"/>
    <path d="M15,15 Q30,22 40,40 Q22,30 15,15 Z" fill="none" stroke="url(#saffronGradient)" stroke-width="0.4"/>
    <circle cx="20" cy="20" r="3" fill="none" stroke="url(#saffronGradient)" stroke-width="0.4"/>
    <circle cx="25" cy="25" r="1.5" fill="url(#saffronGradient)" filter="url(#glow)"/>
  </g>
  
  <g transform="translate(300, 0) rotate(90 0 0)" opacity="0.3">
    <path d="M0,0 Q45,12 55,55 Q12,45 0,0 Z" fill="none" stroke="url(#greenGradient)" stroke-width="1.2"/>
    <path d="M5,5 Q40,15 50,50 Q15,40 5,5 Z" fill="none" stroke="url(#greenGradient)" stroke-width="0.8"/>
    <path d="M10,10 Q35,20 45,45 Q20,35 10,10 Z" fill="none" stroke="url(#greenGradient)" stroke-width="0.6"/>
    <path d="M15,15 Q30,22 40,40 Q22,30 15,15 Z" fill="none" stroke="url(#greenGradient)" stroke-width="0.4"/>
    <circle cx="20" cy="20" r="3" fill="none" stroke="url(#greenGradient)" stroke-width="0.4"/>
    <circle cx="25" cy="25" r="1.5" fill="url(#greenGradient)" filter="url(#glow)"/>
  </g>
  
  <g transform="translate(300, 300) rotate(180 0 0)" opacity="0.3">
    <path d="M0,0 Q45,12 55,55 Q12,45 0,0 Z" fill="none" stroke="url(#blueGradient)" stroke-width="1.2"/>
    <path d="M5,5 Q40,15 50,50 Q15,40 5,5 Z" fill="none" stroke="url(#blueGradient)" stroke-width="0.8"/>
    <path d="M10,10 Q35,20 45,45 Q20,35 10,10 Z" fill="none" stroke="url(#blueGradient)" stroke-width="0.6"/>
    <path d="M15,15 Q30,22 40,40 Q22,30 15,15 Z" fill="none" stroke="url(#blueGradient)" stroke-width="0.4"/>
    <circle cx="20" cy="20" r="3" fill="none" stroke="url(#blueGradient)" stroke-width="0.4"/>
    <circle cx="25" cy="25" r="1.5" fill="url(#blueGradient)" filter="url(#glow)"/>
  </g>
  
  <g transform="translate(0, 300) rotate(270 0 0)" opacity="0.3">
    <path d="M0,0 Q45,12 55,55 Q12,45 0,0 Z" fill="none" stroke="url(#saffronGradient)" stroke-width="1.2"/>
    <path d="M5,5 Q40,15 50,50 Q15,40 5,5 Z" fill="none" stroke="url(#saffronGradient)" stroke-width="0.8"/>
    <path d="M10,10 Q35,20 45,45 Q20,35 10,10 Z" fill="none" stroke="url(#saffronGradient)" stroke-width="0.6"/>
    <path d="M15,15 Q30,22 40,40 Q22,30 15,15 Z" fill="none" stroke="url(#saffronGradient)" stroke-width="0.4"/>
    <circle cx="20" cy="20" r="3" fill="none" stroke="url(#saffronGradient)" stroke-width="0.4"/>
    <circle cx="25" cy="25" r="1.5" fill="url(#saffronGradient)" filter="url(#glow)"/>
  </g>
  
  <!-- Enhanced Om symbol in the center with glowing effect -->
  <g transform="translate(150, 150) scale(0.2)" opacity="0.4">
    <path d="M0,0 C-20,-20 -20,-60 0,-80 C20,-100 60,-100 80,-80 C100,-60 100,-20 80,0 C110,20 110,60 80,80 C60,100 20,100 0,80 C-20,60 -20,20 0,0 Z" fill="none" stroke="url(#saffronGradient)" stroke-width="4" filter="url(#glow)"/>
    <path d="M40,-60 C20,-40 20,40 40,60" fill="none" stroke="url(#saffronGradient)" stroke-width="4" filter="url(#glow)"/>
    <path d="M40,-40 C60,-30 60,30 40,40" fill="none" stroke="url(#saffronGradient)" stroke-width="4" filter="url(#glow)"/>
    <path d="M40,60 C60,70 80,0 40,-40" fill="none" stroke="url(#saffronGradient)" stroke-width="4" filter="url(#glow)"/>
  </g>
</svg> 