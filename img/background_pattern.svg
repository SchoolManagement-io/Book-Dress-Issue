<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <pattern id="schoolPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Base pattern background -->
      <rect x="0" y="0" width="100" height="100" fill="#f8f9fa"/>
      
      <!-- Small circles -->
      <circle cx="10" cy="10" r="2" fill="#198754" opacity="0.1"/>
      <circle cx="30" cy="10" r="1.5" fill="#198754" opacity="0.1"/>
      <circle cx="50" cy="10" r="2" fill="#198754" opacity="0.1"/>
      <circle cx="70" cy="10" r="1.5" fill="#198754" opacity="0.1"/>
      <circle cx="90" cy="10" r="2" fill="#198754" opacity="0.1"/>
      
      <circle cx="10" cy="30" r="1.5" fill="#198754" opacity="0.1"/>
      <circle cx="30" cy="30" r="2" fill="#198754" opacity="0.1"/>
      <circle cx="50" cy="30" r="1.5" fill="#198754" opacity="0.1"/>
      <circle cx="70" cy="30" r="2" fill="#198754" opacity="0.1"/>
      <circle cx="90" cy="30" r="1.5" fill="#198754" opacity="0.1"/>
      
      <circle cx="10" cy="50" r="2" fill="#198754" opacity="0.1"/>
      <circle cx="30" cy="50" r="1.5" fill="#198754" opacity="0.1"/>
      <circle cx="50" cy="50" r="2" fill="#198754" opacity="0.1"/>
      <circle cx="70" cy="50" r="1.5" fill="#198754" opacity="0.1"/>
      <circle cx="90" cy="50" r="2" fill="#198754" opacity="0.1"/>
      
      <circle cx="10" cy="70" r="1.5" fill="#198754" opacity="0.1"/>
      <circle cx="30" cy="70" r="2" fill="#198754" opacity="0.1"/>
      <circle cx="50" cy="70" r="1.5" fill="#198754" opacity="0.1"/>
      <circle cx="70" cy="70" r="2" fill="#198754" opacity="0.1"/>
      <circle cx="90" cy="70" r="1.5" fill="#198754" opacity="0.1"/>
      
      <circle cx="10" cy="90" r="2" fill="#198754" opacity="0.1"/>
      <circle cx="30" cy="90" r="1.5" fill="#198754" opacity="0.1"/>
      <circle cx="50" cy="90" r="2" fill="#198754" opacity="0.1"/>
      <circle cx="70" cy="90" r="1.5" fill="#198754" opacity="0.1"/>
      <circle cx="90" cy="90" r="2" fill="#198754" opacity="0.1"/>
      
      <!-- Plus symbols -->
      <path d="M0,20 L5,20 M2.5,17.5 L2.5,22.5" stroke="#198754" stroke-width="0.5" opacity="0.2"/>
      <path d="M20,40 L25,40 M22.5,37.5 L22.5,42.5" stroke="#198754" stroke-width="0.5" opacity="0.2"/>
      <path d="M40,60 L45,60 M42.5,57.5 L42.5,62.5" stroke="#198754" stroke-width="0.5" opacity="0.2"/>
      <path d="M60,80 L65,80 M62.5,77.5 L62.5,82.5" stroke="#198754" stroke-width="0.5" opacity="0.2"/>
      <path d="M80,0 L85,0 M82.5,-2.5 L82.5,2.5" stroke="#198754" stroke-width="0.5" opacity="0.2"/>
      
      <!-- Squares -->
      <rect x="75" y="75" width="4" height="4" fill="#198754" opacity="0.1"/>
      <rect x="35" y="55" width="4" height="4" fill="#198754" opacity="0.1"/>
      <rect x="85" y="35" width="4" height="4" fill="#198754" opacity="0.1"/>
      <rect x="15" y="85" width="4" height="4" fill="#198754" opacity="0.1"/>
      
      <!-- School-themed mini icons -->
      <!-- Book icon -->
      <g transform="translate(85, 85) scale(0.15)">
        <rect x="0" y="0" width="30" height="20" fill="#198754" opacity="0.3" rx="2" ry="2"/>
        <rect x="15" y="0" width="1" height="20" fill="#198754" opacity="0.5"/>
        <rect x="5" y="5" width="5" height="1" fill="#198754" opacity="0.5"/>
        <rect x="5" y="10" width="5" height="1" fill="#198754" opacity="0.5"/>
        <rect x="20" y="5" width="5" height="1" fill="#198754" opacity="0.5"/>
        <rect x="20" y="10" width="5" height="1" fill="#198754" opacity="0.5"/>
      </g>
      
      <!-- Pencil icon -->
      <g transform="translate(55, 15) scale(0.15) rotate(45)">
        <rect x="0" y="0" width="30" height="7" fill="#198754" opacity="0.3"/>
        <polygon points="0,0 0,7 -7,3.5" fill="#198754" opacity="0.4"/>
      </g>
      
      <!-- Backpack icon -->
      <g transform="translate(15, 45) scale(0.15)">
        <rect x="5" y="10" width="20" height="25" rx="3" ry="3" fill="#198754" opacity="0.3"/>
        <rect x="8" y="5" width="14" height="5" rx="2" ry="2" fill="#198754" opacity="0.3"/>
        <rect x="10" y="0" width="10" height="5" rx="2" ry="2" fill="#198754" opacity="0.3"/>
        <rect x="0" y="15" width="5" height="10" rx="2" ry="2" fill="#198754" opacity="0.3"/>
        <rect x="25" y="15" width="5" height="10" rx="2" ry="2" fill="#198754" opacity="0.3"/>
      </g>
      
      <!-- Ruler icon -->
      <g transform="translate(65, 65) scale(0.15) rotate(-30)">
        <rect x="0" y="0" width="25" height="7" fill="#198754" opacity="0.3"/>
        <rect x="2" y="0" width="1" height="3" fill="#198754" opacity="0.5"/>
        <rect x="5" y="0" width="1" height="5" fill="#198754" opacity="0.5"/>
        <rect x="8" y="0" width="1" height="3" fill="#198754" opacity="0.5"/>
        <rect x="11" y="0" width="1" height="5" fill="#198754" opacity="0.5"/>
        <rect x="14" y="0" width="1" height="3" fill="#198754" opacity="0.5"/>
        <rect x="17" y="0" width="1" height="5" fill="#198754" opacity="0.5"/>
        <rect x="20" y="0" width="1" height="3" fill="#198754" opacity="0.5"/>
        <rect x="23" y="0" width="1" height="5" fill="#198754" opacity="0.5"/>
      </g>
    </pattern>
  </defs>
  
  <!-- Apply the pattern -->
  <rect x="0" y="0" width="100" height="100" fill="url(#schoolPattern)"/>
</svg> 