<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect x="0" y="0" width="400" height="300" fill="#f8f9fa" rx="10" ry="10"/>
  
  <!-- Decorative elements -->
  <circle cx="350" cy="50" r="30" fill="#198754" opacity="0.1"/>
  <circle cx="50" cy="250" r="25" fill="#198754" opacity="0.1"/>
  <circle cx="200" cy="30" r="15" fill="#198754" opacity="0.15"/>
  
  <!-- Shelving Unit -->
  <g id="shelving_unit">
    <!-- Frame -->
    <rect x="50" y="50" width="300" height="220" fill="#6c757d" rx="3" ry="3"/>
    <rect x="55" y="55" width="290" height="210" fill="#e9ecef" rx="2" ry="2"/>
    
    <!-- Shelves -->
    <rect x="55" y="105" width="290" height="5" fill="#6c757d"/>
    <rect x="55" y="160" width="290" height="5" fill="#6c757d"/>
    <rect x="55" y="215" width="290" height="5" fill="#6c757d"/>
    
    <!-- Vertical Dividers -->
    <rect x="150" y="55" width="3" height="210" fill="#6c757d"/>
    <rect x="250" y="55" width="3" height="210" fill="#6c757d"/>
  </g>
  
  <!-- Books on Top Shelf - Left Section -->
  <g id="books_top_left">
    <rect x="65" y="65" width="15" height="40" fill="#0d6efd" rx="1" ry="1"/>
    <rect x="80" y="65" width="12" height="40" fill="#dc3545" rx="1" ry="1"/>
    <rect x="92" y="65" width="20" height="40" fill="#ffc107" rx="1" ry="1"/>
    <rect x="112" y="65" width="10" height="40" fill="#198754" rx="1" ry="1"/>
    <rect x="122" y="65" width="18" height="40" fill="#6610f2" rx="1" ry="1"/>
    
    <!-- Book titles/lines -->
    <line x1="72" y1="75" x2="72" y2="95" stroke="white" stroke-width="1"/>
    <line x1="86" y1="75" x2="86" y2="95" stroke="white" stroke-width="1"/>
    <line x1="102" y1="75" x2="102" y2="95" stroke="white" stroke-width="1"/>
    <line x1="117" y1="75" x2="117" y2="95" stroke="white" stroke-width="1"/>
    <line x1="131" y1="75" x2="131" y2="95" stroke="white" stroke-width="1"/>
  </g>
  
  <!-- Stationery on Top Shelf - Middle Section -->
  <g id="stationery_top_middle">
    <!-- Pencil holder -->
    <rect x="165" y="70" width="25" height="30" fill="#20c997" rx="2" ry="2"/>
    <line x1="170" y1="70" x2="170" y2="65" stroke="#6c757d" stroke-width="2"/>
    <line x1="175" y1="70" x2="175" y2="60" stroke="#6c757d" stroke-width="2"/>
    <line x1="180" y1="70" x2="180" y2="63" stroke="#dc3545" stroke-width="2"/>
    <line x1="185" y1="70" x2="185" y2="62" stroke="#ffc107" stroke-width="2"/>
    
    <!-- Sticky notes -->
    <rect x="200" y="75" width="40" height="25" fill="#ffc107" rx="1" ry="1"/>
    <rect x="200" y="75" width="40" height="5" fill="#fd7e14"/>
    <line x1="205" y1="85" x2="235" y2="85" stroke="#fd7e14" stroke-width="0.5"/>
    <line x1="205" y1="90" x2="235" y2="90" stroke="#fd7e14" stroke-width="0.5"/>
    <line x1="205" y1="95" x2="220" y2="95" stroke="#fd7e14" stroke-width="0.5"/>
  </g>
  
  <!-- Electronics on Top Shelf - Right Section -->
  <g id="electronics_top_right">
    <!-- Calculator -->
    <rect x="265" y="65" width="30" height="35" fill="#212529" rx="2" ry="2"/>
    <rect x="270" y="70" width="20" height="10" fill="#e9ecef" rx="1" ry="1"/>
    <circle cx="275" cy="87" r="3" fill="#adb5bd"/>
    <circle cx="275" cy="95" r="3" fill="#adb5bd"/>
    <circle cx="285" cy="87" r="3" fill="#adb5bd"/>
    <circle cx="285" cy="95" r="3" fill="#adb5bd"/>
    
    <!-- USB drives -->
    <rect x="305" y="70" width="10" height="20" fill="#0d6efd" rx="1" ry="1"/>
    <rect x="320" y="70" width="10" height="20" fill="#dc3545" rx="1" ry="1"/>
    <rect x="305" y="70" width="10" height="5" fill="#0043ce"/>
    <rect x="320" y="70" width="10" height="5" fill="#b02a37"/>
  </g>
  
  <!-- Middle Shelf - Notebooks and Folders -->
  <g id="notebooks_middle">
    <!-- Folders standing -->
    <path d="M70,115 L110,115 L110,155 L70,155 Z" fill="#198754"/>
    <path d="M74,115 L106,115 L106,153 L74,153 Z" fill="#27ae68"/>
    <path d="M78,115 L102,115 L102,151 L78,151 Z" fill="#198754"/>
    
    <!-- Notebooks -->
    <rect x="120" y="115" width="25" height="40" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
    <line x1="120" y1="125" x2="145" y2="125" stroke="#adb5bd" stroke-width="0.5"/>
    <line x1="120" y1="135" x2="145" y2="135" stroke="#adb5bd" stroke-width="0.5"/>
    <line x1="120" y1="145" x2="145" y2="145" stroke="#adb5bd" stroke-width="0.5"/>
    
    <rect x="160" y="115" width="35" height="40" fill="#0dcaf0" rx="2" ry="2"/>
    <rect x="165" y="120" width="25" height="5" fill="white" rx="1" ry="1"/>
    <rect x="165" y="130" width="15" height="2" fill="white"/>
    <rect x="165" y="135" width="20" height="2" fill="white"/>
    <rect x="165" y="140" width="10" height="2" fill="white"/>
    
    <rect x="205" y="120" width="40" height="35" fill="#ffc107" rx="2" ry="2"/>
    <rect x="210" y="125" width="30" height="5" fill="white" rx="1" ry="1"/>
    <circle cx="225" cy="140" r="10" fill="white" opacity="0.5"/>
  </g>
  
  <!-- Art Supplies - Middle Shelf Right -->
  <g id="art_supplies_middle">
    <!-- Paint set -->
    <rect x="260" y="115" width="40" height="25" fill="#6c757d" rx="2" ry="2"/>
    <rect x="265" y="115" width="5" height="5" fill="#dc3545"/>
    <rect x="275" y="115" width="5" height="5" fill="#ffc107"/>
    <rect x="285" y="115" width="5" height="5" fill="#198754"/>
    <rect x="295" y="115" width="5" height="5" fill="#0d6efd"/>
    <rect x="265" y="125" width="30" height="10" fill="#f8f9fa" rx="1" ry="1"/>
    
    <!-- Paintbrushes -->
    <line x1="310" y1="135" x2="310" y2="115" stroke="#adb5bd" stroke-width="2"/>
    <line x1="315" y1="133" x2="315" y2="115" stroke="#adb5bd" stroke-width="2"/>
    <line x1="320" y1="137" x2="320" y2="115" stroke="#adb5bd" stroke-width="2"/>
    <path d="M309,135 L311,142" stroke="#c19a6b" stroke-width="2" stroke-linecap="round"/>
    <path d="M314,133 L316,140" stroke="#c19a6b" stroke-width="2" stroke-linecap="round"/>
    <path d="M319,137 L321,145" stroke="#c19a6b" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Bottom Shelf - Sports Equipment -->
  <g id="sports_equipment_bottom">
    <!-- Basketball -->
    <circle cx="85" cy="190" r="20" fill="#fd7e14"/>
    <path d="M85,170 Q75,180 85,190 Q95,200 85,210" stroke="black" stroke-width="1" fill="none"/>
    <path d="M65,190 Q75,180 85,190 Q95,180 105,190" stroke="black" stroke-width="1" fill="none"/>
    
    <!-- Jump Rope -->
    <ellipse cx="135" cy="190" rx="25" ry="10" fill="none" stroke="#dc3545" stroke-width="3"/>
    <line x1="120" y1="185" x2="115" y2="175" stroke="#6c757d" stroke-width="3" stroke-linecap="round"/>
    <line x1="150" y1="185" x2="155" y2="175" stroke="#6c757d" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Tennis Racket -->
    <ellipse cx="200" cy="187" rx="15" ry="20" fill="none" stroke="#6c757d" stroke-width="3"/>
    <line x1="200" y1="207" x2="200" y2="225" stroke="#6c757d" stroke-width="3"/>
    <line x1="190" y1="177" x2="210" y2="197" stroke="#adb5bd" stroke-width="1"/>
    <line x1="190" y1="197" x2="210" y2="177" stroke="#adb5bd" stroke-width="1"/>
    <line x1="185" y1="187" x2="215" y2="187" stroke="#adb5bd" stroke-width="1"/>
    <line x1="200" y1="172" x2="200" y2="202" stroke="#adb5bd" stroke-width="1"/>
  </g>
  
  <!-- Lab Equipment - Bottom Shelf Right -->
  <g id="lab_equipment_bottom">
    <!-- Test tubes -->
    <rect x="260" y="170" width="30" height="10" fill="#6c757d" rx="2" ry="2"/>
    <rect x="265" y="165" width="4" height="20" fill="#f8f9fa" rx="3" ry="3"/>
    <rect x="273" y="165" width="4" height="20" fill="#f8f9fa" rx="3" ry="3"/>
    <rect x="281" y="165" width="4" height="20" fill="#f8f9fa" rx="3" ry="3"/>
    <rect x="265" y="175" width="4" height="10" fill="#dc3545" opacity="0.7"/>
    <rect x="273" y="175" width="4" height="8" fill="#0dcaf0" opacity="0.7"/>
    <rect x="281" y="175" width="4" height="5" fill="#ffc107" opacity="0.7"/>
    
    <!-- Microscope -->
    <rect x="300" y="190" width="20" height="10" fill="#212529" rx="1" ry="1"/>
    <rect x="307" y="170" width="6" height="20" fill="#6c757d"/>
    <ellipse cx="310" cy="170" rx="10" ry="4" fill="#6c757d"/>
    <ellipse cx="310" cy="166" rx="8" ry="3" fill="#212529"/>
    <ellipse cx="310" cy="185" rx="3" ry="2" fill="#0d6efd" opacity="0.8"/>
  </g>
  
  <!-- Interactive elements: hover indicators -->
  <g id="hover_indicators" opacity="0">
    <circle cx="100" cy="85" r="30" fill="#198754" opacity="0.3" class="hover-zone" data-section="books"/>
    <circle cx="200" cy="85" r="30" fill="#198754" opacity="0.3" class="hover-zone" data-section="stationery"/>
    <circle cx="300" cy="85" r="30" fill="#198754" opacity="0.3" class="hover-zone" data-section="electronics"/>
    <circle cx="125" cy="135" r="30" fill="#198754" opacity="0.3" class="hover-zone" data-section="notebooks"/>
    <circle cx="300" cy="135" r="30" fill="#198754" opacity="0.3" class="hover-zone" data-section="art"/>
    <circle cx="100" cy="190" r="30" fill="#198754" opacity="0.3" class="hover-zone" data-section="sports"/>
    <circle cx="300" cy="190" r="30" fill="#198754" opacity="0.3" class="hover-zone" data-section="lab"/>
  </g>
  
  <!-- Labels that appear on hover -->
  <g id="hover_labels" opacity="0">
    <rect x="80" y="45" width="40" height="15" fill="white" rx="3" ry="3" class="label" data-for="books"/>
    <text x="100" y="55" font-family="'Poppins', sans-serif" font-size="8" text-anchor="middle" fill="#198754" class="label-text" data-for="books">Books</text>
    
    <rect x="180" y="45" width="40" height="15" fill="white" rx="3" ry="3" class="label" data-for="stationery"/>
    <text x="200" y="55" font-family="'Poppins', sans-serif" font-size="8" text-anchor="middle" fill="#198754" class="label-text" data-for="stationery">Stationery</text>
    
    <rect x="280" y="45" width="40" height="15" fill="white" rx="3" ry="3" class="label" data-for="electronics"/>
    <text x="300" y="55" font-family="'Poppins', sans-serif" font-size="8" text-anchor="middle" fill="#198754" class="label-text" data-for="electronics">Electronics</text>
    
    <rect x="105" y="155" width="40" height="15" fill="white" rx="3" ry="3" class="label" data-for="notebooks"/>
    <text x="125" y="165" font-family="'Poppins', sans-serif" font-size="8" text-anchor="middle" fill="#198754" class="label-text" data-for="notebooks">Notebooks</text>
    
    <rect x="280" y="155" width="40" height="15" fill="white" rx="3" ry="3" class="label" data-for="art"/>
    <text x="300" y="165" font-family="'Poppins', sans-serif" font-size="8" text-anchor="middle" fill="#198754" class="label-text" data-for="art">Art Supplies</text>
    
    <rect x="80" y="155" width="40" height="15" fill="white" rx="3" ry="3" class="label" data-for="sports"/>
    <text x="100" y="165" font-family="'Poppins', sans-serif" font-size="8" text-anchor="middle" fill="#198754" class="label-text" data-for="sports">Sports</text>
    
    <rect x="280" y="210" width="40" height="15" fill="white" rx="3" ry="3" class="label" data-for="lab"/>
    <text x="300" y="220" font-family="'Poppins', sans-serif" font-size="8" text-anchor="middle" fill="#198754" class="label-text" data-for="lab">Lab Supplies</text>
  </g>
</svg> 