<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <!-- Enhanced background with subtle gradient -->
  <defs>
    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fa" />
      <stop offset="100%" stop-color="#e9ecef" />
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- Subtle texture pattern -->
    <pattern id="texture" patternUnits="userSpaceOnUse" width="100" height="100" patternTransform="scale(0.5)">
      <rect width="100" height="100" fill="#ffffff" />
      <path d="M0,0 L10,10 M20,0 L30,10 M40,0 L50,10 M60,0 L70,10 M80,0 L90,10
              M0,20 L10,30 M20,20 L30,30 M40,20 L50,30 M60,20 L70,30 M80,20 L90,30
              M0,40 L10,50 M20,40 L30,50 M40,40 L50,50 M60,40 L70,50 M80,40 L90,50
              M0,60 L10,70 M20,60 L30,70 M40,60 L50,70 M60,60 L70,70 M80,60 L90,70
              M0,80 L10,90 M20,80 L30,90 M40,80 L50,90 M60,80 L70,90 M80,80 L90,90"
            stroke="#f0f0f0" stroke-width="0.5" />
    </pattern>
    
    <!-- Glossy surface for devices -->
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fa" />
      <stop offset="50%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e9ecef" />
    </linearGradient>
    
    <!-- Wood texture for table -->
    <linearGradient id="woodGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B4513" />
      <stop offset="20%" stop-color="#A0522D" />
      <stop offset="40%" stop-color="#8B4513" />
      <stop offset="60%" stop-color="#A0522D" />
      <stop offset="80%" stop-color="#8B4513" />
      <stop offset="100%" stop-color="#A0522D" />
    </linearGradient>
  </defs>
  
  <!-- Enhanced background -->
  <rect x="0" y="0" width="500" height="300" fill="url(#backgroundGradient)" rx="10" ry="10"/>
  <rect x="0" y="0" width="500" height="300" fill="url(#texture)" opacity="0.05" rx="10" ry="10"/>
  
  <!-- Enhanced decorative elements -->
  <circle cx="450" cy="50" r="30" fill="#198754" opacity="0.08"/>
  <circle cx="460" cy="40" r="20" fill="#198754" opacity="0.05"/>
  <circle cx="50" cy="270" r="25" fill="#198754" opacity="0.08"/>
  <circle cx="40" cy="260" r="15" fill="#198754" opacity="0.05"/>
  <circle cx="250" cy="30" r="15" fill="#198754" opacity="0.12"/>
  <circle cx="240" cy="35" r="10" fill="#198754" opacity="0.05"/>
  
  <!-- Enhanced Office/Classroom Environment with realistic shadows -->
  <rect x="70" y="150" width="360" height="120" fill="#e9ecef" rx="5" ry="5" filter="url(#shadow)"/>
  <rect x="70" y="150" width="360" height="20" fill="#adb5bd" rx="5" ry="5"/>
  
  <!-- Enhanced table with wood texture and shadow -->
  <rect x="100" y="180" width="300" height="5" fill="url(#woodGradient)"/>
  <rect x="100" y="185" width="300" height="65" fill="#d4b895" filter="url(#shadow)"/>
  <rect x="100" y="185" width="300" height="65" fill="url(#texture)" opacity="0.2"/>
  <!-- Wood grain lines -->
  <g stroke="#a0855c" stroke-width="0.5" opacity="0.5">
    <line x1="120" y1="185" x2="120" y2="250"/>
    <line x1="150" y1="185" x2="150" y2="250"/>
    <line x1="190" y1="185" x2="190" y2="250"/>
    <line x1="230" y1="185" x2="230" y2="250"/>
    <line x1="270" y1="185" x2="270" y2="250"/>
    <line x1="310" y1="185" x2="310" y2="250"/>
    <line x1="350" y1="185" x2="350" y2="250"/>
  </g>
  
  <!-- Enhanced books and materials on table with realistic shadows -->
  <rect x="120" y="170" width="40" height="15" fill="#3787ff" rx="1" ry="1" filter="url(#shadow)"/>
  <rect x="122" y="172" width="36" height="2" fill="#2570d4" opacity="0.3"/>
  
  <rect x="170" y="170" width="35" height="15" fill="#e74c3c" rx="1" ry="1" filter="url(#shadow)"/>
  <rect x="172" y="172" width="31" height="2" fill="#c0392b" opacity="0.3"/>
  
  <rect x="215" y="170" width="30" height="15" fill="#ffc107" rx="1" ry="1" filter="url(#shadow)"/>
  <rect x="217" y="172" width="26" height="2" fill="#e5ac00" opacity="0.3"/>
  
  <rect x="340" y="170" width="40" height="15" fill="#27ae60" rx="1" ry="1" filter="url(#shadow)"/>
  <rect x="342" y="172" width="36" height="2" fill="#229954" opacity="0.3"/>
  
  <!-- Enhanced computer screen with realistic display -->
  <rect x="260" y="170" width="60" height="45" fill="#212529" rx="3" ry="3" filter="url(#shadow)"/>
  <rect x="265" y="175" width="50" height="35" fill="url(#screenGradient)" rx="1" ry="1"/>
  <line x1="270" y1="185" x2="310" y2="185" stroke="#198754" stroke-width="2"/>
  <line x1="270" y1="190" x2="295" y2="190" stroke="#198754" stroke-width="2"/>
  <line x1="270" y1="195" x2="305" y2="195" stroke="#198754" stroke-width="2"/>
  <line x1="270" y1="200" x2="290" y2="200" stroke="#198754" stroke-width="2"/>
  <line x1="270" y1="205" x2="300" y2="205" stroke="#198754" stroke-width="1"/>
  <!-- Screen reflection -->
  <path d="M265,175 L315,175 L315,180 Q290,185 265,180 Z" fill="#ffffff" opacity="0.1"/>
  
  <!-- Enhanced person 1 (Teacher) with realistic features -->
  <g transform="translate(140, 230)">
    <!-- Enhanced body with shadow and depth -->
    <circle cx="0" cy="0" r="20" fill="#7d58c9" filter="url(#shadow)"/>
    <rect x="-10" y="20" width="20" height="30" fill="#7d58c9" rx="5" ry="5" filter="url(#shadow)"/>
    <rect x="-15" y="20" width="5" height="25" fill="#7d58c9" rx="2" ry="2" filter="url(#shadow)"/>
    <rect x="10" y="20" width="5" height="15" fill="#7d58c9" rx="2" ry="2" filter="url(#shadow)"/>
    <rect x="10" y="20" width="15" height="5" fill="#7d58c9" rx="2" ry="2" filter="url(#shadow)"/>
    
    <!-- Face details -->
    <circle cx="-5" cy="-5" r="3" fill="#f8f9fa"/>
    <circle cx="5" cy="-5" r="3" fill="#f8f9fa"/>
    <circle cx="-5" cy="-5" r="1.5" fill="#333"/>
    <circle cx="5" cy="-5" r="1.5" fill="#333"/>
    <path d="M-5,5 Q0,10 5,5" stroke="#f8f9fa" stroke-width="1.5" fill="none"/>
    
    <!-- Highlights on clothing for 3D effect -->
    <path d="M-8,20 C-5,22 5,22 8,20" fill="#6c49b8" opacity="0.5"/>
  </g>
  
  <!-- Enhanced person 2 (Administrator) with realistic features -->
  <g transform="translate(250, 230)">
    <!-- Enhanced body with shadow and depth -->
    <circle cx="0" cy="0" r="20" fill="#e74c3c" filter="url(#shadow)"/>
    <rect x="-10" y="20" width="20" height="30" fill="#e74c3c" rx="5" ry="5" filter="url(#shadow)"/>
    <rect x="-15" y="20" width="5" height="20" fill="#e74c3c" rx="2" ry="2" filter="url(#shadow)"/>
    <rect x="10" y="20" width="5" height="20" fill="#e74c3c" rx="2" ry="2" filter="url(#shadow)"/>
    
    <!-- Face details -->
    <circle cx="-5" cy="-5" r="3" fill="#f8f9fa"/>
    <circle cx="5" cy="-5" r="3" fill="#f8f9fa"/>
    <circle cx="-5" cy="-5" r="1.5" fill="#333"/>
    <circle cx="5" cy="-5" r="1.5" fill="#333"/>
    <path d="M-5,5 Q0,10 5,5" stroke="#f8f9fa" stroke-width="1.5" fill="none"/>
    
    <!-- Highlights on clothing for 3D effect -->
    <path d="M-8,20 C-5,22 5,22 8,20" fill="#c13c2d" opacity="0.5"/>
  </g>
  
  <!-- Enhanced person 3 (Inventory Manager) with realistic features -->
  <g transform="translate(350, 230)">
    <!-- Enhanced body with shadow and depth -->
    <circle cx="0" cy="0" r="20" fill="#27ae60" filter="url(#shadow)"/>
    <rect x="-10" y="20" width="20" height="30" fill="#27ae60" rx="5" ry="5" filter="url(#shadow)"/>
    <rect x="-15" y="20" width="5" height="15" fill="#27ae60" rx="2" ry="2" filter="url(#shadow)"/>
    <rect x="-15" y="35" width="15" height="5" fill="#27ae60" rx="2" ry="2" filter="url(#shadow)"/>
    <rect x="10" y="20" width="5" height="25" fill="#27ae60" rx="2" ry="2" filter="url(#shadow)"/>
    
    <!-- Face details -->
    <circle cx="-5" cy="-5" r="3" fill="#f8f9fa"/>
    <circle cx="5" cy="-5" r="3" fill="#f8f9fa"/>
    <circle cx="-5" cy="-5" r="1.5" fill="#333"/>
    <circle cx="5" cy="-5" r="1.5" fill="#333"/>
    <path d="M-5,5 Q0,10 5,5" stroke="#f8f9fa" stroke-width="1.5" fill="none"/>
    
    <!-- Highlights on clothing for 3D effect -->
    <path d="M-8,20 C-5,22 5,22 8,20" fill="#229954" opacity="0.5"/>
  </g>
  
  <!-- Enhanced thought bubbles and education icons with shadows and depth -->
  <!-- Person 1 thought bubble -->
  <g filter="url(#shadow)">
    <circle cx="110" cy="190" r="15" fill="white" stroke="#6c757d" stroke-width="1"/>
    <circle cx="95" cy="175" r="10" fill="white" stroke="#6c757d" stroke-width="1"/>
    <circle cx="85" cy="160" r="6" fill="white" stroke="#6c757d" stroke-width="1"/>
  </g>
  
  <!-- Book icon in thought bubble with enhanced details -->
  <g transform="translate(105, 185)">
    <rect x="0" y="0" width="10" height="12" fill="#3787ff" rx="1" ry="1"/>
    <line x1="0" y1="5" x2="10" y2="5" stroke="white" stroke-width="1"/>
    <line x1="2" y1="8" x2="8" y2="8" stroke="white" stroke-width="0.5"/>
    <line x1="2" y1="11" x2="8" y2="11" stroke="white" stroke-width="0.5"/>
  </g>
  
  <!-- Person 3 thought bubble -->
  <g filter="url(#shadow)">
    <circle cx="380" cy="190" r="15" fill="white" stroke="#6c757d" stroke-width="1"/>
    <circle cx="395" cy="175" r="10" fill="white" stroke="#6c757d" stroke-width="1"/>
    <circle cx="405" cy="160" r="6" fill="white" stroke="#6c757d" stroke-width="1"/>
  </g>
  
  <!-- Chart icon in thought bubble with enhanced details -->
  <g transform="translate(375, 185)">
    <rect x="0" y="0" width="10" height="10" fill="#27ae60" rx="1" ry="1"/>
    <polyline points="0,10 3,6 6,8 10,2" stroke="white" stroke-width="1" fill="none"/>
    <circle cx="3" cy="6" r="1" fill="#ffffff"/>
    <circle cx="6" cy="8" r="1" fill="#ffffff"/>
    <circle cx="10" cy="2" r="1" fill="#ffffff"/>
  </g>
  
  <!-- Enhanced educational elements floating above with realistic shadows -->
  <!-- Pencil with realistic texture and eraser -->
  <g transform="translate(155, 65)" filter="url(#shadow)">
    <linearGradient id="pencilGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffeb3b" />
      <stop offset="100%" stop-color="#ffc107" />
    </linearGradient>
    <polygon points="0,0 50,50 60,40 10,-10" fill="url(#pencilGradient)"/>
    <polygon points="-5,-5 5,5 -15,15 -25,5" fill="#e74c3c"/>
    <polygon points="50,50 60,40 65,45 55,55" fill="#95a5a6"/>
    <!-- Wood texture lines -->
    <g stroke="#e5ac00" stroke-width="0.5" opacity="0.5">
      <line x1="5" y1="-5" x2="55" y2="45"/>
      <line x1="10" y1="-10" x2="60" y2="40"/>
      <line x1="0" y1="0" x2="50" y2="50"/>
    </g>
  </g>
  
  <!-- Calculator with realistic buttons and display -->
  <g transform="translate(300, 70)" filter="url(#shadow)">
    <rect x="0" y="0" width="40" height="50" fill="#34495e" rx="3" ry="3"/>
    <rect x="5" y="5" width="30" height="15" fill="#ecf0f1" rx="1" ry="1"/>
    <!-- Calculator display content -->
    <text x="8" y="15" font-family="monospace" font-size="8" fill="#2c3e50">123.45</text>
    
    <!-- Realistic 3D buttons -->
    <g>
      <!-- Row 1 -->
      <circle cx="10" cy="28" r="4" fill="#7f8c8d" stroke="#95a5a6" stroke-width="1"/>
      <circle cx="20" cy="28" r="4" fill="#7f8c8d" stroke="#95a5a6" stroke-width="1"/>
      <circle cx="30" cy="28" r="4" fill="#7f8c8d" stroke="#95a5a6" stroke-width="1"/>
      
      <!-- Row 2 -->
      <circle cx="10" cy="38" r="4" fill="#7f8c8d" stroke="#95a5a6" stroke-width="1"/>
      <circle cx="20" cy="38" r="4" fill="#7f8c8d" stroke="#95a5a6" stroke-width="1"/>
      <circle cx="30" cy="38" r="4" fill="#7f8c8d" stroke="#95a5a6" stroke-width="1"/>
    </g>
    
    <!-- Button labels -->
    <text x="8.5" y="30.5" font-family="Arial" font-size="5" fill="#fff">7</text>
    <text x="18.5" y="30.5" font-family="Arial" font-size="5" fill="#fff">8</text>
    <text x="28.5" y="30.5" font-family="Arial" font-size="5" fill="#fff">9</text>
    <text x="8.5" y="40.5" font-family="Arial" font-size="5" fill="#fff">4</text>
    <text x="18.5" y="40.5" font-family="Arial" font-size="5" fill="#fff">5</text>
    <text x="28.5" y="40.5" font-family="Arial" font-size="5" fill="#fff">6</text>
  </g>
  
  <!-- Notebook with realistic paper and binding -->
  <g transform="translate(230, 85)" filter="url(#shadow)">
    <rect x="0" y="0" width="40" height="50" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1"/>
    <!-- Spiral binding -->
    <g fill="#95a5a6">
      <rect x="18" y="0" width="4" height="50" fill="#95a5a6"/>
      <rect x="19" y="2" width="2" height="3" fill="#ecf0f1" rx="1" ry="1"/>
      <rect x="19" y="8" width="2" height="3" fill="#ecf0f1" rx="1" ry="1"/>
      <rect x="19" y="14" width="2" height="3" fill="#ecf0f1" rx="1" ry="1"/>
      <rect x="19" y="20" width="2" height="3" fill="#ecf0f1" rx="1" ry="1"/>
      <rect x="19" y="26" width="2" height="3" fill="#ecf0f1" rx="1" ry="1"/>
      <rect x="19" y="32" width="2" height="3" fill="#ecf0f1" rx="1" ry="1"/>
      <rect x="19" y="38" width="2" height="3" fill="#ecf0f1" rx="1" ry="1"/>
      <rect x="19" y="44" width="2" height="3" fill="#ecf0f1" rx="1" ry="1"/>
    </g>
    
    <!-- Paper lines with subtle blue -->
    <line x1="2" y1="10" x2="17" y2="10" stroke="#cfd8dc" stroke-width="0.5"/>
    <line x1="22" y1="10" x2="38" y2="10" stroke="#cfd8dc" stroke-width="0.5"/>
    <line x1="2" y1="15" x2="17" y2="15" stroke="#cfd8dc" stroke-width="0.5"/>
    <line x1="22" y1="15" x2="38" y2="15" stroke="#cfd8dc" stroke-width="0.5"/>
    <line x1="2" y1="20" x2="17" y2="20" stroke="#cfd8dc" stroke-width="0.5"/>
    <line x1="22" y1="20" x2="38" y2="20" stroke="#cfd8dc" stroke-width="0.5"/>
    <line x1="2" y1="25" x2="17" y2="25" stroke="#cfd8dc" stroke-width="0.5"/>
    <line x1="22" y1="25" x2="38" y2="25" stroke="#cfd8dc" stroke-width="0.5"/>
    <line x1="2" y1="30" x2="17" y2="30" stroke="#cfd8dc" stroke-width="0.5"/>
    <line x1="22" y1="30" x2="38" y2="30" stroke="#cfd8dc" stroke-width="0.5"/>
    <line x1="2" y1="35" x2="17" y2="35" stroke="#cfd8dc" stroke-width="0.5"/>
    <line x1="22" y1="35" x2="38" y2="35" stroke="#cfd8dc" stroke-width="0.5"/>
    <line x1="2" y1="40" x2="17" y2="40" stroke="#cfd8dc" stroke-width="0.5"/>
    <line x1="22" y1="40" x2="38" y2="40" stroke="#cfd8dc" stroke-width="0.5"/>
    <line x1="2" y1="45" x2="17" y2="45" stroke="#cfd8dc" stroke-width="0.5"/>
    <line x1="22" y1="45" x2="38" y2="45" stroke="#cfd8dc" stroke-width="0.5"/>
    
    <!-- Red margin line -->
    <line x1="5" y1="0" x2="5" y2="50" stroke="#e74c3c" stroke-width="0.5" opacity="0.7"/>
    <line x1="22" y1="0" x2="22" y2="50" stroke="#e74c3c" stroke-width="0.5" opacity="0.7"/>
  </g>
  
  <!-- Enhanced title text with shadow -->
  <g filter="url(#shadow)">
    <text x="250" y="40" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#198754" font-weight="bold">Our Dedicated Team</text>
  </g>
  
  <!-- Team member labels with subtle animations -->
  <g>
    <rect x="110" y="190" width="60" height="20" fill="white" rx="5" ry="5" opacity="0" class="label">
      <animate attributeName="opacity" values="0;0.9;0" dur="5s" begin="2s" repeatCount="indefinite"/>
    </rect>
    <text x="140" y="205" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#7d58c9" opacity="0" class="label-text">
      <animate attributeName="opacity" values="0;1;0" dur="5s" begin="2s" repeatCount="indefinite"/>
      Teacher
    </text>
    
    <rect x="220" y="190" width="60" height="20" fill="white" rx="5" ry="5" opacity="0" class="label">
      <animate attributeName="opacity" values="0;0.9;0" dur="5s" begin="4s" repeatCount="indefinite"/>
    </rect>
    <text x="250" y="205" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#e74c3c" opacity="0" class="label-text">
      <animate attributeName="opacity" values="0;1;0" dur="5s" begin="4s" repeatCount="indefinite"/>
      Administrator
    </text>
    
    <rect x="305" y="190" width="90" height="20" fill="white" rx="5" ry="5" opacity="0" class="label">
      <animate attributeName="opacity" values="0;0.9;0" dur="5s" begin="6s" repeatCount="indefinite"/>
    </rect>
    <text x="350" y="205" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#27ae60" opacity="0" class="label-text">
      <animate attributeName="opacity" values="0;1;0" dur="5s" begin="6s" repeatCount="indefinite"/>
      Inventory Manager
    </text>
  </g>
</svg> 