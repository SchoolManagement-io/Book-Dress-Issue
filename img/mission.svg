<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <!-- Enhanced definitions with professional gradients and effects -->
  <defs>
    <!-- Background gradient -->
    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
    
    <!-- Compass gradient -->
    <linearGradient id="compassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    
    <!-- Primary accent gradient -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#27ae60"/>
      <stop offset="100%" stop-color="#1e8449"/>
    </linearGradient>
    
    <!-- Education icons gradients -->
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3498db"/>
      <stop offset="100%" stop-color="#2980b9"/>
    </linearGradient>
    
    <linearGradient id="capGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    
    <linearGradient id="bulbGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f1c40f"/>
      <stop offset="100%" stop-color="#f39c12"/>
    </linearGradient>
    
    <linearGradient id="pencilGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#95a5a6"/>
      <stop offset="100%" stop-color="#7f8c8d"/>
    </linearGradient>
    
    <!-- Enhanced shadow effects -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="2" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
    
    <!-- Subtle inner glow -->
    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" result="blur"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.7" result="glow"/>
      <feComposite in="glow" in2="blur" operator="in" result="softGlow"/>
      <feComposite in="softGlow" in2="SourceGraphic" operator="over"/>
    </filter>
    
    <!-- Subtle texture pattern -->
    <pattern id="texture" patternUnits="userSpaceOnUse" width="100" height="100" patternTransform="scale(0.5)">
      <rect width="100" height="100" fill="#ffffff" opacity="0"/>
      <path d="M0,0 L10,10 M20,0 L30,10 M40,0 L50,10 M60,0 L70,10 M80,0 L90,10
              M0,20 L10,30 M20,20 L30,30 M40,20 L50,30 M60,20 L70,30 M80,20 L90,30
              M0,40 L10,50 M20,40 L30,50 M40,40 L50,50 M60,40 L70,50 M80,40 L90,50
              M0,60 L10,70 M20,60 L30,70 M40,60 L50,70 M60,60 L70,70 M80,60 L90,70
              M0,80 L10,90 M20,80 L30,90 M40,80 L50,90 M60,80 L70,90 M80,80 L90,90"
            stroke="#f0f0f0" stroke-width="0.3"/>
    </pattern>
  </defs>
  
  <!-- Enhanced background with gradient and texture -->
  <rect x="0" y="0" width="400" height="250" fill="url(#backgroundGradient)" rx="10" ry="10"/>
  <rect x="0" y="0" width="400" height="250" fill="url(#texture)" opacity="0.05" rx="10" ry="10"/>
  
  <!-- Enhanced decorative elements with subtle animation -->
  <circle cx="350" cy="40" r="20" fill="#198754" opacity="0.08">
    <animate attributeName="r" values="20;22;20" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.08;0.05;0.08" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="30" cy="200" r="15" fill="#198754" opacity="0.08">
    <animate attributeName="r" values="15;17;15" dur="8s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="opacity" values="0.08;0.05;0.08" dur="8s" repeatCount="indefinite" begin="2s"/>
  </circle>
  <circle cx="200" cy="20" r="10" fill="#198754" opacity="0.12">
    <animate attributeName="r" values="10;12;10" dur="8s" repeatCount="indefinite" begin="4s"/>
    <animate attributeName="opacity" values="0.12;0.08;0.12" dur="8s" repeatCount="indefinite" begin="4s"/>
  </circle>
  
  <!-- Enhanced central compass design with shadow and texture -->
  <g filter="url(#dropShadow)">
    <circle cx="200" cy="125" r="80" fill="url(#compassGradient)" stroke="#6c757d" stroke-width="2"/>
    <circle cx="200" cy="125" r="75" fill="none" stroke="#adb5bd" stroke-width="1" stroke-dasharray="3,2"/>
    <circle cx="200" cy="125" r="10" fill="url(#primaryGradient)">
      <animate attributeName="r" values="10;11;10" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Enhanced compass directions with gradient and glow -->
  <g filter="url(#innerGlow)">
    <line x1="200" y1="45" x2="200" y2="65" stroke="url(#primaryGradient)" stroke-width="3" stroke-linecap="round"/>
    <line x1="200" y1="185" x2="200" y2="205" stroke="url(#primaryGradient)" stroke-width="3" stroke-linecap="round"/>
    <line x1="120" y1="125" x2="140" y2="125" stroke="url(#primaryGradient)" stroke-width="3" stroke-linecap="round"/>
    <line x1="260" y1="125" x2="280" y2="125" stroke="url(#primaryGradient)" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Enhanced direction labels with professional typography -->
  <g filter="url(#dropShadow)">
    <text x="200" y="40" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#198754">VISION</text>
    <text x="200" y="215" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#198754">EXCELLENCE</text>
    <text x="110" y="125" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="end" alignment-baseline="middle" fill="#198754">COMMUNITY</text>
    <text x="290" y="125" font-family="Arial, sans-serif" font-size="13" font-weight="bold" text-anchor="start" alignment-baseline="middle" fill="#198754">INNOVATION</text>
  </g>
  
  <!-- Enhanced diagonal compass lines with gradient -->
  <g filter="url(#innerGlow)">
    <line x1="142" y1="67" x2="158" y2="83" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round"/>
    <line x1="142" y1="183" x2="158" y2="167" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round"/>
    <line x1="242" y1="183" x2="258" y2="167" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round"/>
    <line x1="242" y1="67" x2="258" y2="83" stroke="url(#primaryGradient)" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Enhanced education icons around compass with professional gradients and shadows -->
  <!-- Book at top -->
  <g transform="translate(185, 80) scale(0.7)" filter="url(#dropShadow)">
    <rect x="0" y="0" width="40" height="30" fill="url(#bookGradient)" rx="3" ry="3"/>
    <rect x="20" y="0" width="2" height="30" fill="#f8f9fa"/>
    <rect x="5" y="5" width="10" height="2" fill="#f8f9fa"/>
    <rect x="5" y="10" width="10" height="2" fill="#f8f9fa"/>
    <rect x="25" y="5" width="10" height="2" fill="#f8f9fa"/>
    <rect x="25" y="10" width="10" height="2" fill="#f8f9fa"/>
    <!-- Page curl effect -->
    <path d="M40,0 L40,5 C35,5 35,0 40,0" fill="#ffffff" opacity="0.3"/>
  </g>
  
  <!-- Graduation cap on right with enhanced 3D effect -->
  <g transform="translate(270, 110) scale(0.7)" filter="url(#dropShadow)">
    <rect x="0" y="10" width="30" height="5" fill="url(#capGradient)"/>
    <polygon points="15,0 30,10 0,10" fill="url(#capGradient)"/>
    <circle cx="15" cy="5" r="3" fill="#f8f9fa"/>
    <rect x="13" y="15" width="4" height="10" fill="url(#capGradient)"/>
    <rect x="10" y="25" width="10" height="2" fill="url(#capGradient)"/>
    <!-- Tassel with movement -->
    <path d="M17,15 Q20,18 22,23" stroke="#f8f9fa" stroke-width="1" fill="none">
      <animate attributeName="d" values="M17,15 Q20,18 22,23;M17,15 Q19,20 20,25;M17,15 Q20,18 22,23" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Light bulb on left with glowing effect -->
  <g transform="translate(95, 110) scale(0.7)" filter="url(#dropShadow)">
    <circle cx="15" cy="10" r="10" fill="url(#bulbGradient)"/>
    <rect x="10" y="20" width="10" height="5" fill="url(#bulbGradient)" rx="2" ry="2"/>
    <rect x="12" y="25" width="6" height="3" fill="url(#bulbGradient)" rx="1" ry="1"/>
    <path d="M8,10 Q15,20 22,10" stroke="#fff" stroke-width="1.5" fill="none"/>
    <line x1="15" y1="0" x2="15" y2="5" stroke="#fff" stroke-width="1.5"/>
    <!-- Light rays with animation -->
    <g opacity="0.8">
      <path d="M5,5 L2,2" stroke="#fff" stroke-width="0.8">
        <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3s" repeatCount="indefinite"/>
      </path>
      <path d="M5,15 L2,18" stroke="#fff" stroke-width="0.8">
        <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3s" repeatCount="indefinite" begin="0.5s"/>
      </path>
      <path d="M25,5 L28,2" stroke="#fff" stroke-width="0.8">
        <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3s" repeatCount="indefinite" begin="1s"/>
      </path>
      <path d="M25,15 L28,18" stroke="#fff" stroke-width="0.8">
        <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3s" repeatCount="indefinite" begin="1.5s"/>
      </path>
    </g>
  </g>
  
  <!-- Pencil at bottom with enhanced wood texture and details -->
  <g transform="translate(185, 160) scale(0.7)" filter="url(#dropShadow)">
    <polygon points="0,25 40,25 40,20 35,15 5,15 0,20" fill="url(#pencilGradient)"/>
    <!-- Wood texture for pencil body -->
    <linearGradient id="woodTexture" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffc107"/>
      <stop offset="20%" stop-color="#ffca28"/>
      <stop offset="40%" stop-color="#ffc107"/>
      <stop offset="60%" stop-color="#ffca28"/>
      <stop offset="80%" stop-color="#ffc107"/>
      <stop offset="100%" stop-color="#ffca28"/>
    </linearGradient>
    <polygon points="5,15 35,15 35,0 5,0" fill="url(#woodTexture)"/>
    <polygon points="15,0 25,0 25,15 15,15" fill="#f8f9fa" opacity="0.3"/>
    <polygon points="5,0 10,0 10,15 5,15" fill="#212529" opacity="0.1"/>
    <polygon points="30,0 35,0 35,15 30,15" fill="#212529" opacity="0.1"/>
    <!-- Wood grain lines -->
    <line x1="7" y1="0" x2="7" y2="15" stroke="#e5a000" stroke-width="0.5" opacity="0.5"/>
    <line x1="12" y1="0" x2="12" y2="15" stroke="#e5a000" stroke-width="0.5" opacity="0.5"/>
    <line x1="28" y1="0" x2="28" y2="15" stroke="#e5a000" stroke-width="0.5" opacity="0.5"/>
    <line x1="33" y1="0" x2="33" y2="15" stroke="#e5a000" stroke-width="0.5" opacity="0.5"/>
  </g>
  
  <!-- Enhanced text with professional typography and subtle animation -->
  <g filter="url(#dropShadow)">
    <text x="200" y="125" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#198754">MISSION</text>
  </g>
  
  <!-- Enhanced interactive elements - pulsing circle with gradient -->
  <circle cx="200" cy="125" r="60" fill="none" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.6" filter="url(#innerGlow)">
    <animate attributeName="r" values="60;65;60" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Additional subtle radial gradient background for depth -->
  <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </radialGradient>
  <circle cx="200" cy="125" r="100" fill="url(#centerGlow)" opacity="0.6"/>
</svg> 