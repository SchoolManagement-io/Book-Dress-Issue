<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <!-- Background -->
  <rect x="0" y="0" width="400" height="250" fill="#f8f9fa" rx="10" ry="10"/>
  
  <!-- Decorative elements -->
  <circle cx="350" cy="40" r="20" fill="#198754" opacity="0.1"/>
  <circle cx="50" cy="200" r="15" fill="#198754" opacity="0.1"/>
  <circle cx="200" cy="30" r="10" fill="#198754" opacity="0.15"/>
  
  <!-- Central mobile/message interface -->
  <rect x="130" y="60" width="140" height="170" rx="10" ry="10" fill="#fff" stroke="#6c757d" stroke-width="2"/>
  <rect x="135" y="65" width="130" height="160" rx="8" ry="8" fill="#e9ecef"/>
  <rect x="145" y="80" width="110" height="130" rx="5" ry="5" fill="#fff"/>
  
  <!-- Speaker at top of phone -->
  <rect x="185" y="70" width="30" height="5" rx="2.5" ry="2.5" fill="#adb5bd"/>
  
  <!-- Message bubbles -->
  <!-- Incoming message bubble -->
  <rect x="150" y="90" width="70" height="25" rx="10" ry="10" fill="#e9ecef"/>
  <text x="155" y="107" font-family="Arial, sans-serif" font-size="10" fill="#212529">Hello! Need help?</text>
  
  <!-- Outgoing message bubble -->
  <rect x="180" y="125" width="70" height="25" rx="10" ry="10" fill="#198754"/>
  <text x="185" y="142" font-family="Arial, sans-serif" font-size="10" fill="#fff">Yes, about books</text>
  
  <!-- Incoming message bubble -->
  <rect x="150" y="160" width="80" height="25" rx="10" ry="10" fill="#e9ecef"/>
  <text x="155" y="177" font-family="Arial, sans-serif" font-size="10" fill="#212529">We're here to help!</text>
  
  <!-- Contact icons on left -->
  <!-- Email icon -->
  <g transform="translate(60, 90)">
    <rect x="0" y="0" width="40" height="30" rx="5" ry="5" fill="#0d6efd"/>
    <polyline points="0,0 20,15 40,0" stroke="#fff" stroke-width="2" fill="none"/>
  </g>
  <text x="80" y="135" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#212529">Email</text>
  
  <!-- Phone icon -->
  <g transform="translate(60, 150)">
    <rect x="10" y="0" width="20" height="35" rx="3" ry="3" fill="#dc3545"/>
    <rect x="15" y="5" width="10" height="20" rx="1" ry="1" fill="#fff"/>
    <circle cx="20" cy="30" r="3" fill="#fff"/>
  </g>
  <text x="80" y="195" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#212529">Phone</text>
  
  <!-- Contact icons on right -->
  <!-- Location icon -->
  <g transform="translate(300, 90)">
    <path d="M20,0 C9,0 0,9 0,20 C0,35 20,50 20,50 C20,50 40,35 40,20 C40,9 31,0 20,0 Z" fill="#198754"/>
    <circle cx="20" cy="20" r="8" fill="#fff"/>
  </g>
  <text x="320" y="150" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#212529">Location</text>
  
  <!-- Social icon -->
  <g transform="translate(300, 170)">
    <rect x="5" y="0" width="30" height="30" rx="15" ry="15" fill="#6610f2"/>
    <path d="M15,10 Q20,5 25,10 Q30,15 25,20 Q20,25 15,20 Q10,15 15,10 Z" fill="#fff"/>
    <circle cx="20" cy="10" r="2" fill="#6610f2"/>
    <circle cx="20" cy="20" r="2" fill="#6610f2"/>
    <circle cx="10" cy="15" r="2" fill="#6610f2"/>
    <circle cx="30" cy="15" r="2" fill="#6610f2"/>
  </g>
  <text x="320" y="215" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="#212529">Social</text>
  
  <!-- Title at top -->
  <text x="200" y="40" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#198754">Get in Touch</text>
  
  <!-- Animated elements -->
  <!-- Pulsing circles around phone -->
  <circle cx="200" cy="145" r="80" fill="none" stroke="#198754" stroke-width="1" opacity="0.5">
    <animate attributeName="r" values="80;85;80" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="200" cy="145" r="95" fill="none" stroke="#198754" stroke-width="1" opacity="0.3">
    <animate attributeName="r" values="95;100;95" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Dots for typing animation -->
  <circle cx="160" cy="200" r="2" fill="#198754">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle cx="165" cy="200" r="2" fill="#198754">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" begin="0.2s"/>
  </circle>
  <circle cx="170" cy="200" r="2" fill="#198754">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite" begin="0.4s"/>
  </circle>
</svg> 