<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <!-- Background with subtle Indian patterns -->
  <rect width="800" height="450" fill="#f8f9fa"/>
  
  <!-- Wall pattern with rangoli-inspired design -->
  <rect width="800" height="200" fill="#e9ecef"/>
  <g transform="translate(0, 0)" opacity="0.1">
    <path d="M0,0 C200,0 200,40 400,40 C600,40 600,0 800,0" stroke="#FF9933" stroke-width="2" fill="none"/>
    <path d="M0,20 C200,20 200,60 400,60 C600,60 600,20 800,20" stroke="#138808" stroke-width="2" fill="none"/>
    <path d="M0,40 C200,40 200,80 400,80 C600,80 600,40 800,40" stroke="#0066CC" stroke-width="2" fill="none"/>
    <path d="M0,60 C200,60 200,100 400,100 C600,100 600,60 800,60" stroke="#FF9933" stroke-width="2" fill="none"/>
    <path d="M0,80 C200,80 200,120 400,120 C600,120 600,80 800,80" stroke="#138808" stroke-width="2" fill="none"/>
    <path d="M0,100 C200,100 200,140 400,140 C600,140 600,100 800,100" stroke="#0066CC" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Flooring -->
  <rect x="0" y="200" width="800" height="250" fill="#f1f3f5"/>
  <g opacity="0.1">
    <line x1="0" y1="220" x2="800" y2="220" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="270" x2="800" y2="270" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="320" x2="800" y2="320" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="370" x2="800" y2="370" stroke="#333" stroke-width="1"/>
    <line x1="0" y1="420" x2="800" y2="420" stroke="#333" stroke-width="1"/>
    
    <line x1="100" y1="200" x2="100" y2="450" stroke="#333" stroke-width="1"/>
    <line x1="200" y1="200" x2="200" y2="450" stroke="#333" stroke-width="1"/>
    <line x1="300" y1="200" x2="300" y2="450" stroke="#333" stroke-width="1"/>
    <line x1="400" y1="200" x2="400" y2="450" stroke="#333" stroke-width="1"/>
    <line x1="500" y1="200" x2="500" y2="450" stroke="#333" stroke-width="1"/>
    <line x1="600" y1="200" x2="600" y2="450" stroke="#333" stroke-width="1"/>
    <line x1="700" y1="200" x2="700" y2="450" stroke="#333" stroke-width="1"/>
  </g>
  
  <!-- Classroom Equipment -->
  <!-- Blackboard -->
  <rect x="320" y="30" width="240" height="140" fill="#264653" stroke="#495057" stroke-width="3"/>
  <rect x="330" y="40" width="220" height="120" fill="none" stroke="#f8f9fa" stroke-width="1" stroke-dasharray="2"/>
  
  <!-- Text on blackboard -->
  <text x="390" y="80" font-family="'Tiro Devanagari Hindi', serif" font-size="16" fill="#f8f9fa">विद्या ददाति विनयम्</text>
  <text x="340" y="110" font-family="Arial, sans-serif" font-size="12" fill="#f8f9fa">Knowledge gives humility</text>
  <text x="350" y="140" font-family="Arial, sans-serif" font-size="12" fill="#f8f9fa">S = πr² (Area of Circle)</text>
  
  <!-- Desk -->
  <rect x="300" y="180" width="280" height="15" fill="#a98467" stroke="#6c584c" stroke-width="1"/>
  <rect x="310" y="195" width="10" height="250" fill="#a98467" stroke="#6c584c" stroke-width="1"/>
  <rect x="560" y="195" width="10" height="250" fill="#a98467" stroke="#6c584c" stroke-width="1"/>
  
  <!-- Teacher (Female in Saree) -->
  <g transform="translate(400, 300)">
    <!-- Body (Saree) -->
    <path d="M0,0 C-10,-30 -15,-70 -5,-100 C0,-110 -20,-130 -15,-140 C-5,-150 5,-145 10,-130 C15,-110 5,-100 10,-90 C20,-70 25,-40 20,0 Z" fill="#e63946" stroke="#333" stroke-width="1"/>
    <path d="M0,0 C10,-30 15,-70 5,-100 C0,-110 10,-120 15,-130 C20,-140 25,-130 20,-120 C10,-100 5,-90 0,-80 C-5,-60 -10,-30 0,0 Z" fill="#e63946" stroke="#333" stroke-width="1"/>
    
    <!-- Saree pallu (over shoulder) -->
    <path d="M-15,-130 C-20,-120 -15,-110 -5,-100 C0,-95 0,-90 -5,-85 C-15,-80 -20,-70 -15,-60 C-5,-50 5,-55 10,-60 C15,-65 20,-75 15,-85 C10,-90 5,-95 5,-100 C5,-110 0,-120 -15,-130 Z" fill="#4cc9f0" stroke="#333" stroke-width="1"/>
    
    <!-- Face -->
    <circle cx="0" cy="-150" r="20" fill="#ffddd2" stroke="#333" stroke-width="1"/>
    
    <!-- Eyes -->
    <ellipse cx="-7" cy="-153" rx="3" ry="2" fill="#333"/>
    <ellipse cx="7" cy="-153" rx="3" ry="2" fill="#333"/>
    
    <!-- Smile -->
    <path d="M-7,-145 C-3,-142 3,-142 7,-145" fill="none" stroke="#333" stroke-width="1"/>
    
    <!-- Hair (with bun) -->
    <path d="M-18,-165 C-15,-175 -5,-180 0,-180 C5,-180 15,-175 18,-165 C20,-160 20,-155 20,-150 C20,-145 15,-140 10,-140 C5,-140 5,-145 0,-145 C-5,-145 -5,-140 -10,-140 C-15,-140 -20,-145 -20,-150 C-20,-155 -20,-160 -18,-165 Z" fill="#333"/>
    <ellipse cx="0" cy="-170" rx="10" ry="5" fill="#333"/>
    
    <!-- Bindi -->
    <circle cx="0" cy="-160" r="2" fill="#e63946"/>
    
    <!-- Jewelry - necklace -->
    <path d="M-10,-130 C-5,-125 5,-125 10,-130" fill="none" stroke="#ffd700" stroke-width="1"/>
    
    <!-- Hands -->
    <path d="M-15,-90 C-25,-85 -30,-80 -35,-70 C-37,-65 -35,-60 -30,-60 C-25,-60 -20,-65 -15,-70 Z" fill="#ffddd2" stroke="#333" stroke-width="1"/>
    <path d="M15,-90 C25,-80 35,-75 40,-65 C43,-60 40,-55 35,-55 C30,-55 25,-60 20,-65 Z" fill="#ffddd2" stroke="#333" stroke-width="1"/>
  </g>
  
  <!-- Students (multiple in different uniforms) -->
  <!-- Student 1 (Girl in Salwar Kameez) -->
  <g transform="translate(150, 350)">
    <!-- Body (Salwar Kameez) -->
    <path d="M0,0 C-5,-20 -7,-40 -5,-60 C-4,-70 -3,-75 0,-80 C3,-75 4,-70 5,-60 C7,-40 5,-20 0,0 Z" fill="#4cc9f0" stroke="#333" stroke-width="1"/>
    
    <!-- Dupatta -->
    <path d="M-5,-60 C-10,-55 -15,-55 -15,-50 C-15,-45 -10,-45 -5,-47 C0,-48 0,-50 0,-55 C0,-58 -3,-60 -5,-60 Z" fill="#a5e1ad" stroke="#333" stroke-width="1"/>
    
    <!-- Face -->
    <circle cx="0" cy="-90" r="10" fill="#ffddd2" stroke="#333" stroke-width="1"/>
    
    <!-- Eyes -->
    <ellipse cx="-3" cy="-92" rx="1.5" ry="1" fill="#333"/>
    <ellipse cx="3" cy="-92" rx="1.5" ry="1" fill="#333"/>
    
    <!-- Smile -->
    <path d="M-3,-88 C-1,-87 1,-87 3,-88" fill="none" stroke="#333" stroke-width="1"/>
    
    <!-- Hair (with braids) -->
    <path d="M-8,-100 C-7,-102 -4,-103 0,-103 C4,-103 7,-102 8,-100 C9,-98 9,-96 9,-94 C9,-92 8,-90 5,-90 C3,-90 3,-92 0,-92 C-3,-92 -3,-90 -5,-90 C-8,-90 -9,-92 -9,-94 C-9,-96 -9,-98 -8,-100 Z" fill="#333"/>
    <path d="M0,-90 C0,-85 0,-80 2,-75 C4,-70 5,-65 5,-60" fill="none" stroke="#333" stroke-width="1"/>
    
    <!-- Books in hand -->
    <rect x="-15" y="-50" width="10" height="15" fill="#a5e1ad" stroke="#333" stroke-width="1"/>
  </g>
  
  <!-- Student 2 (Boy in Uniform) -->
  <g transform="translate(250, 340)">
    <!-- Body (School Uniform) -->
    <rect x="-10" y="-60" width="20" height="60" fill="#fff" stroke="#333" stroke-width="1"/>
    <rect x="-15" y="-20" width="30" height="20" fill="#264653" stroke="#333" stroke-width="1"/>
    
    <!-- Face -->
    <circle cx="0" cy="-75" r="10" fill="#ffddd2" stroke="#333" stroke-width="1"/>
    
    <!-- Eyes -->
    <ellipse cx="-3" cy="-77" rx="1.5" ry="1" fill="#333"/>
    <ellipse cx="3" cy="-77" rx="1.5" ry="1" fill="#333"/>
    
    <!-- Smile -->
    <path d="M-3,-73 C-1,-72 1,-72 3,-73" fill="none" stroke="#333" stroke-width="1"/>
    
    <!-- Hair -->
    <path d="M-8,-85 C-7,-87 -4,-88 0,-88 C4,-88 7,-87 8,-85 C9,-83 9,-81 9,-79 C9,-77 8,-75 5,-75 C3,-75 3,-77 0,-77 C-3,-77 -3,-75 -5,-75 C-8,-75 -9,-77 -9,-79 C-9,-81 -9,-83 -8,-85 Z" fill="#333"/>
    
    <!-- Hand raised -->
    <path d="M10,-40 C15,-45 20,-55 25,-60 C27,-62 30,-62 30,-60 C30,-58 28,-55 25,-52 C20,-48 15,-45 10,-40 Z" fill="#ffddd2" stroke="#333" stroke-width="1"/>
  </g>
  
  <!-- Student 3 (Girl in uniform) -->
  <g transform="translate(550, 360)">
    <!-- Body (School Uniform - skirt) -->
    <rect x="-10" y="-60" width="20" height="30" fill="#fff" stroke="#333" stroke-width="1"/>
    <path d="M-10,-30 C-20,-10 -20,0 0,0 C20,0 20,-10 10,-30 Z" fill="#264653" stroke="#333" stroke-width="1"/>
    
    <!-- Face -->
    <circle cx="0" cy="-75" r="10" fill="#ffddd2" stroke="#333" stroke-width="1"/>
    
    <!-- Eyes -->
    <ellipse cx="-3" cy="-77" rx="1.5" ry="1" fill="#333"/>
    <ellipse cx="3" cy="-77" rx="1.5" ry="1" fill="#333"/>
    
    <!-- Smile -->
    <path d="M-3,-73 C-1,-72 1,-72 3,-73" fill="none" stroke="#333" stroke-width="1"/>
    
    <!-- Hair (ponytail) -->
    <path d="M-8,-85 C-7,-87 -4,-88 0,-88 C4,-88 7,-87 8,-85 C9,-83 9,-81 9,-79 C9,-77 8,-75 5,-75 C3,-75 3,-77 0,-77 C-3,-77 -3,-75 -5,-75 C-8,-75 -9,-77 -9,-79 C-9,-81 -9,-83 -8,-85 Z" fill="#333"/>
    <path d="M8,-80 C10,-78 12,-76 13,-74 C14,-72 14,-70 12,-68" fill="#333" stroke="#333" stroke-width="1"/>
    
    <!-- Notebook -->
    <rect x="-15" y="-40" width="10" height="15" fill="#f1faee" stroke="#333" stroke-width="1"/>
    <line x1="-15" y1="-35" x2="-5" y2="-35" stroke="#333" stroke-width="0.5"/>
    <line x1="-15" y1="-30" x2="-5" y2="-30" stroke="#333" stroke-width="0.5"/>
  </g>
  
  <!-- Student 4 (Boy sitting at desk) -->
  <g transform="translate(650, 350)">
    <!-- Body (School Uniform) -->
    <rect x="-10" y="-50" width="20" height="50" fill="#fff" stroke="#333" stroke-width="1"/>
    <rect x="-15" y="-10" width="30" height="10" fill="#264653" stroke="#333" stroke-width="1"/>
    
    <!-- Face -->
    <circle cx="0" cy="-65" r="10" fill="#ffddd2" stroke="#333" stroke-width="1"/>
    
    <!-- Eyes -->
    <ellipse cx="-3" cy="-67" rx="1.5" ry="1" fill="#333"/>
    <ellipse cx="3" cy="-67" rx="1.5" ry="1" fill="#333"/>
    
    <!-- Smile -->
    <path d="M-3,-63 C-1,-62 1,-62 3,-63" fill="none" stroke="#333" stroke-width="1"/>
    
    <!-- Hair -->
    <path d="M-8,-75 C-7,-77 -4,-78 0,-78 C4,-78 7,-77 8,-75 C9,-73 9,-71 9,-69 C9,-67 8,-65 5,-65 C3,-65 3,-67 0,-67 C-3,-67 -3,-65 -5,-65 C-8,-65 -9,-67 -9,-69 C-9,-71 -9,-73 -8,-75 Z" fill="#333"/>
    
    <!-- Hands on desk -->
    <path d="M-10,-30 C-15,-28 -20,-25 -20,-20" fill="none" stroke="#ffddd2" stroke-width="3"/>
    <path d="M10,-30 C15,-28 20,-25 20,-20" fill="none" stroke="#ffddd2" stroke-width="3"/>
  </g>
  
  <!-- Classroom Decoration -->
  <!-- Map of India -->
  <g transform="translate(100, 100) scale(0.5)">
    <path d="M0,0 C10,-20 30,-10 40,0 C50,10 70,10 80,0 C90,-10 100,-5 110,10 C120,20 130,10 140,20 C150,30 160,20 170,30 C180,40 200,30 200,50 C200,70 180,80 170,90 C160,100 150,110 140,100 C130,90 120,100 110,90 C100,80 90,90 80,80 C70,70 60,80 50,70 C40,60 30,70 20,60 C10,50 -10,40 0,0 Z" fill="#f8f9fa" stroke="#333" stroke-width="1"/>
    <!-- India tricolor lines -->
    <line x1="20" y1="20" x2="180" y2="20" stroke="#FF9933" stroke-width="2"/>
    <line x1="20" y1="45" x2="180" y2="45" stroke="#ffffff" stroke-width="2"/>
    <line x1="20" y1="70" x2="180" y2="70" stroke="#138808" stroke-width="2"/>
  </g>
  
  <!-- Educational Charts -->
  <rect x="650" y="50" width="80" height="100" fill="#f1faee" stroke="#333" stroke-width="1"/>
  <line x1="650" y1="70" x2="730" y2="70" stroke="#333" stroke-width="1"/>
  <text x="660" y="65" font-family="Arial, sans-serif" font-size="8" fill="#333">PERIODIC TABLE</text>
  <g transform="translate(690, 100)">
    <rect x="-25" y="-15" width="50" height="50" fill="none" stroke="#333" stroke-width="0.5"/>
    <line x1="-25" y1="-5" x2="25" y2="-5" stroke="#333" stroke-width="0.5"/>
    <line x1="-25" y1="5" x2="25" y2="5" stroke="#333" stroke-width="0.5"/>
    <line x1="-25" y1="15" x2="25" y2="15" stroke="#333" stroke-width="0.5"/>
    <line x1="-15" y1="-15" x2="-15" y2="35" stroke="#333" stroke-width="0.5"/>
    <line x1="-5" y1="-15" x2="-5" y2="35" stroke="#333" stroke-width="0.5"/>
    <line x1="5" y1="-15" x2="5" y2="35" stroke="#333" stroke-width="0.5"/>
    <line x1="15" y1="-15" x2="15" y2="35" stroke="#333" stroke-width="0.5"/>
  </g>
  
  <!-- Window showing outdoors -->
  <rect x="50" y="40" width="120" height="100" fill="#48cae4" stroke="#333" stroke-width="2"/>
  <line x1="110" y1="40" x2="110" y2="140" stroke="#333" stroke-width="2"/>
  <line x1="50" y1="90" x2="170" y2="90" stroke="#333" stroke-width="2"/>
  
  <!-- Sun and clouds outside -->
  <circle cx="80" cy="65" r="15" fill="#ffd166" stroke="#ffd166" stroke-width="1"/>
  <path d="M140,65 C150,60 160,60 165,65 C170,70 170,75 165,80 C160,85 150,85 140,80 C135,75 135,70 140,65 Z" fill="#f8f9fa" stroke="#f8f9fa" stroke-width="1"/>
  
  <!-- School bell -->
  <path d="M570,60 C580,50 590,50 600,60 C610,70 610,100 600,110 C590,120 580,120 570,110 C560,100 560,70 570,60 Z" fill="#fdc500" stroke="#333" stroke-width="1"/>
  <rect x="580" y="40" width="10" height="20" fill="#333"/>
  <circle cx="585" cy="110" r="5" fill="#333"/>
  
  <!-- Inspirational quote on wall -->
  <text x="200" y="180" font-family="'Tiro Devanagari Hindi', serif" font-size="12" fill="#333">शिक्षा सर्वोत्तम धन है - Education is the greatest wealth</text>
  
  <!-- Digital Clock -->
  <rect x="200" y="40" width="60" height="30" fill="#212529" stroke="#333" stroke-width="1"/>
  <text x="210" y="60" font-family="'Courier New', monospace" font-size="16" fill="#4cc9f0">10:30</text>
  
  <!-- Interactive learning scene -->
  <text x="400" y="425" font-family="Arial, sans-serif" font-size="14" fill="#333" text-anchor="middle">Interactive Learning in Modern Indian Classroom</text>
</svg> 